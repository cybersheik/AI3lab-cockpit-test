<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI³ Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00E5FF;
            --purple: #7B2D8E;
            --orange: #FF6B2B;
            --dark-bg: #0A0A0F;
            --dark-surface: #12121A;
            --light-text: #FFFFFF;
            --gray-text: #8B8B9A;
            --green: #4CAF50;
            --amber: #FF9800;
            --red: #F44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--light-text);
            overflow: hidden;
            height: 100vh; width: 100vw;
        }
        canvas#three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* ═══ LOADER ═══ */
        #loader {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--dark-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            transition: opacity 0.8s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .loader-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px; font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .loader-sub { font-size: 11px; color: var(--gray-text); letter-spacing: 4px; text-transform: uppercase; }
        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

        /* ═══ OVERLAYS ═══ */
        /* scanline removed — отвлекает */
        .vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 5;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        /* ═══ TOPBAR ═══ */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(180deg, rgba(10,10,15,0.85) 0%, transparent 100%);
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .logo-badge {
            width: 36px; height: 36px; border-radius: 8px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px;
            box-shadow: 0 0 16px rgba(0,229,255,0.3);
            animation: badge-glow 3s ease-in-out infinite;
        }
        @keyframes badge-glow { 0%,100%{box-shadow:0 0 16px rgba(0,229,255,0.3)} 50%{box-shadow:0 0 24px rgba(0,229,255,0.6),0 0 48px rgba(123,45,142,0.2)} }
        .topbar-title {
            font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .mode-bar {
            display: flex; gap: 2px; padding: 3px;
            background: rgba(255,255,255,0.04); border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .mode-btn {
            padding: 5px 10px; border-radius: 6px; border: none;
            font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
            color: var(--gray-text); background: transparent; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.3px; white-space: nowrap;
        }
        .mode-btn.active { background: rgba(0,229,255,0.12); color: var(--cyan); }
        .mode-btn:hover:not(.active) { color: var(--light-text); }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px;
            background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.12);
            font-size: 10px; font-weight: 600; color: var(--cyan);
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }
        .hud-time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gray-text); }
        .hud-time .val { color: var(--cyan); }

        /* ═══ HUMAN PRESENCE ═══ */
        .human-presence {
            position: fixed; top: 50%; transform: translateY(-50%);
            z-index: 15; display: flex; flex-direction: column;
            align-items: center; gap: 8px; opacity: 0.4;
            transition: opacity 0.3s;
        }
        .human-presence:hover { opacity: 0.8; }
        .human-presence.left { left: 24px; }
        .human-presence.right { left: 24px; }
        .human-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .human-avatar svg { width: 20px; height: 20px; stroke: var(--gray-text); fill: none; stroke-width: 1.5; }
        .human-label {
            font-size: 8px; color: var(--gray-text);
            font-weight: 600; letter-spacing: 1.5px;
            writing-mode: vertical-rl; text-orientation: mixed;
            text-transform: uppercase;
        }

        /* ═══ BOTTOM DOCK ═══ */
        .bottom-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 40; display: flex; justify-content: center;
            padding-bottom: 16px;
        }
        .dock-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 18px; border-radius: 22px;
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.5), 0 0 80px rgba(0,229,255,0.03);
        }
        .dock-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 16px; border-radius: 16px;
            border: none; background: transparent;
            cursor: pointer; transition: all 0.25s; position: relative;
            font-family: 'Inter', sans-serif;
        }
        .dock-btn:hover { background: rgba(255,255,255,0.04); }
        .dock-btn.active { background: rgba(255,255,255,0.06); }
        .dock-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            background: rgba(255,255,255,0.03);
            overflow: hidden;
        }
        .dock-btn.active .dock-icon {
            box-shadow: 0 0 20px var(--panel-glow);
            background: rgba(255,255,255,0.06);
        }

        /* ═══ KIMI ORBITAL MICRO (dock buttons) ═══ */
        .kimi-micro {
            position: relative; width: 24px; height: 24px;
        }
        .kimi-micro .km-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--ac);
            box-shadow: 0 0 4px var(--ac);
            z-index: 3;
            animation: kmPulse 3s ease-in-out infinite;
        }
        @keyframes kmPulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50% { transform: translate(-50%,-50%) scale(1.2); box-shadow: 0 0 6px var(--ac); }
        }
        .kimi-micro .km-orbit {
            position: absolute; top: 50%; left: 50%;
            border: 0.8px solid color-mix(in srgb, var(--ac) 40%, transparent);
            border-radius: 50%;
        }
        .kimi-micro .km-o1 {
            width: 14px; height: 14px;
            animation: kOrbit1 6s linear infinite;
        }
        .kimi-micro .km-o2 {
            width: 20px; height: 20px;
            border-color: color-mix(in srgb, var(--ac) 30%, transparent);
            animation: kOrbit2 9s linear infinite;
        }
        @keyframes kOrbit1 { from { transform: translate(-50%,-50%) rotateX(60deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(60deg) rotateZ(360deg); } }
        @keyframes kOrbit2 { from { transform: translate(-50%,-50%) rotateX(45deg) rotateY(30deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(45deg) rotateY(30deg) rotateZ(360deg); } }
        .kimi-micro .km-dot {
            position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
            background: var(--ac); box-shadow: 0 0 3px var(--ac);
        }
        .kimi-micro .km-o1 .km-dot { top: 0; left: 50%; transform: translateX(-50%); }
        .kimi-micro .km-o2 .km-dot { top: 50%; right: 0; transform: translateY(-50%); }

        /* ═══ KIMI ORBITAL COMPACT (avatar panel cards) ═══ */
        .kimi-orbital {
            position: relative; width: 44px; height: 44px;
        }
        .kimi-orbital .k-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 14px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--ac), color-mix(in srgb, var(--ac) 60%, #000));
            box-shadow: 0 0 8px var(--ac), 0 0 16px color-mix(in srgb, var(--ac) 40%, transparent);
            z-index: 3;
            animation: kCorePulse 3s ease-in-out infinite;
        }
        @keyframes kCorePulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); box-shadow: 0 0 8px var(--ac), 0 0 16px color-mix(in srgb, var(--ac) 40%, transparent); }
            50% { transform: translate(-50%,-50%) scale(1.12); box-shadow: 0 0 12px var(--ac), 0 0 24px color-mix(in srgb, var(--ac) 60%, transparent); }
        }
        .kimi-orbital .k-orbit {
            position: absolute; top: 50%; left: 50%;
            border: 1px solid color-mix(in srgb, var(--ac) 35%, transparent);
            border-radius: 50%;
        }
        .kimi-orbital .k-o1 { width: 26px; height: 26px; animation: kOrbit1 6s linear infinite; }
        .kimi-orbital .k-o2 { width: 36px; height: 36px; border-color: color-mix(in srgb, var(--ac) 25%, transparent); animation: kOrbit2 9s linear infinite; }
        .kimi-orbital .k-o3 { width: 44px; height: 44px; animation: kOrbit3 13s linear infinite; }
        @keyframes kOrbit3 { from { transform: translate(-50%,-50%) rotateX(30deg) rotateY(-20deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(30deg) rotateY(-20deg) rotateZ(-360deg); } }
        .kimi-orbital .k-dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: var(--ac); box-shadow: 0 0 4px var(--ac);
        }
        .kimi-orbital .k-o1 .k-dot { top: 0; left: 50%; transform: translateX(-50%); }
        .kimi-orbital .k-o2 .k-dot { top: 50%; right: 0; transform: translateY(-50%); }
        .kimi-orbital .k-o3 .k-dot { bottom: 0; left: 50%; transform: translateX(-50%); }
        .kimi-orbital .k-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            border: 1px solid var(--ac); border-radius: 50%;
            opacity: 0; width: 14px; height: 14px;
        }
        .kimi-orbital .k-p1 { animation: kPulse 3s ease-out infinite; }
        .kimi-orbital .k-p2 { animation: kPulse 3s ease-out infinite 1s; }
        @keyframes kPulse {
            0% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
        }
        .avatar-card-sphere { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }

        .dock-label { font-size: 9px; font-weight: 600; color: var(--gray-text); transition: color 0.2s; }
        .dock-btn.active .dock-label { color: var(--light-text); }
        .dock-notif {
            position: absolute; top: 6px; right: 10px;
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--red); border: 1.5px solid rgba(10,14,23,0.9);
            animation: pulse 1.5s infinite;
        }
        .dock-indicator {
            position: absolute; bottom: 4px;
            width: 16px; height: 2px; border-radius: 1px;
            transition: all 0.3s;
        }
        .dock-btn.active .dock-indicator { background: var(--panel-color); }

        /* variant-toggle removed */

        /* ═══ SLIDE-UP PANEL ═══ */
        .panel-backdrop {
            position: fixed; inset: 0; z-index: 35;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none; transition: opacity 0.35s;
        }
        .panel-backdrop.visible { opacity: 1; pointer-events: auto; }

        .panel-container {
            position: fixed; bottom: 80px; left: 16px; right: 16px;
            z-index: 36; max-height: 55vh;
            border-radius: 20px; overflow: hidden;
            background: rgba(13, 19, 32, 0.95);
            backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(0,229,255,0.1);
            box-shadow:
                0 -20px 60px rgba(0,0,0,0.4),
                0 0 80px rgba(0,229,255,0.04),
                inset 0 1px 0 rgba(255,255,255,0.04);
            transform: translateY(120%);
            opacity: 0;
            will-change: transform, opacity;
        }
        /* Top accent line */
        .panel-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 10%, var(--panel-accent, var(--cyan)) 50%, transparent 90%);
            opacity: 0.6;
        }
        /* corner-accent removed */

        .panel-inner { padding: 20px 24px; display: flex; flex-direction: column; height: 100%; max-height: 55vh; }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; flex-shrink: 0;
        }
        .panel-title {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--panel-accent, var(--cyan)), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .panel-close {
            width: 28px; height: 28px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: var(--gray-text); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 14px;
        }
        .panel-close:hover { border-color: var(--cyan); color: var(--cyan); }
        .panel-body { flex: 1; overflow-y: auto; min-height: 0; }

        /* ═══ PANEL: AVATARS ═══ */
        .avatar-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding-top: 8px; }
        .avatar-card {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 20px 24px; border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: pointer; transition: all 0.3s; min-width: 120px;
        }
        .avatar-card:hover { background: rgba(0,229,255,0.04); border-color: rgba(0,229,255,0.12); transform: translateY(-3px); }
        .avatar-card-sphere {
            width: 56px; height: 56px; border-radius: 50%;
            position: relative;
        }
        .avatar-card-sphere canvas { width: 100%; height: 100%; border-radius: 50%; }
        .avatar-card-name { font-size: 13px; font-weight: 600; }
        .avatar-card-role { font-size: 10px; color: var(--gray-text); text-align: center; }
        .avatar-card-status {
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 5px;
        }
        .status-indicator { width: 5px; height: 5px; border-radius: 50%; }

        /* ═══ PANEL: COMM ═══ */
        .routing-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; flex-shrink: 0; }
        .route-chip {
            padding: 5px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 10px; font-weight: 600; color: var(--gray-text);
            cursor: pointer; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .route-chip:hover, .route-chip.active { border-color: rgba(0,188,212,0.4); color: #00BCD4; background: rgba(0,188,212,0.06); }
        .comm-msg {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 12px; border-radius: 10px;
            background: rgba(255,255,255,0.015);
            border-left: 2px solid rgba(0,188,212,0.4);
            margin-bottom: 8px; transition: background 0.2s;
        }
        .comm-msg:hover { background: rgba(0,188,212,0.03); }
        .comm-route {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: #00BCD4; white-space: nowrap; min-width: 90px;
        }
        .comm-route .arr { color: var(--gray-text); }
        .comm-body { flex: 1; min-width: 0; }
        .comm-topic { font-size: 12px; font-weight: 600; }
        .comm-text { font-size: 11px; color: var(--gray-text); margin-top: 2px; }
        .comm-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gray-text); opacity: 0.5; white-space: nowrap; }
        .comm-input-row {
            display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.04); flex-shrink: 0;
        }
        .comm-input {
            flex: 1; padding: 10px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            color: var(--light-text); font-family: 'Inter', sans-serif; font-size: 12px;
            outline: none; transition: border-color 0.2s;
        }
        .comm-input:focus { border-color: rgba(0,188,212,0.3); }
        .comm-input::placeholder { color: rgba(255,255,255,0.2); }
        .comm-send {
            padding: 10px 18px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, rgba(0,188,212,0.3), rgba(123,45,142,0.3));
            border: 1px solid rgba(0,188,212,0.2);
            color: white; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;
        }
        .comm-send:hover { background: linear-gradient(135deg, rgba(0,188,212,0.4), rgba(123,45,142,0.4)); }

        /* ═══ PANEL: CODE ═══ */
        .terminal-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0; }
        .terminal-tab {
            padding: 5px 12px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.03); color: var(--gray-text);
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .terminal-tab.active { background: rgba(76,175,80,0.12); color: var(--green); }
        .terminal-output {
            flex: 1; padding: 14px; border-radius: 12px;
            background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.04);
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            line-height: 1.8; overflow-y: auto;
        }
        .t-g { color: #4CAF50; } .t-c { color: var(--cyan); } .t-b { color: #42A5F5; }
        .t-y { color: #FFCA28; } .t-d { color: rgba(255,255,255,0.4); }
        .cursor-blink { display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

        /* ═══ PANEL: INPUT ═══ */
        .input-area {
            flex: 1; padding: 14px; border-radius: 12px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            color: var(--light-text); font-family: 'Inter', sans-serif; font-size: 13px;
            line-height: 1.6; resize: none; outline: none; transition: border-color 0.2s;
        }
        .input-area:focus { border-color: rgba(255,255,255,0.15); }
        .input-area::placeholder { color: rgba(255,255,255,0.15); }
        .input-controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-shrink: 0; }
        .input-mode-btn {
            width: 44px; height: 44px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: var(--gray-text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .input-mode-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
        .input-mode-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--light-text); }
        .input-send-btn {
            flex: 1; height: 44px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(123,45,142,0.15));
            border: 1px solid rgba(0,229,255,0.15);
            color: var(--light-text); font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .input-send-btn:hover { background: linear-gradient(135deg, rgba(0,229,255,0.25), rgba(123,45,142,0.25)); }

        /* ═══ PANEL: NOTES ═══ */
        .notes-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-shrink: 0; }
        .notes-tab {
            padding: 6px 14px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.03); color: var(--gray-text);

// Kimi orbital — compact для аватар-карточек

const PANELS_CFG = [

    { id: 'input',    label: 'Stage 3',  color: '#FF6B2B', glow: 'rgba(255,107,43,0.4)' },
    { id: 'notes',    label: 'Adaptive', color: '#FFC107', glow: 'rgba(255,193,7,0.4)' },
];

const MESSAGES = [
    { from: 'Human', to: 'Product', text: 'Фокус на модели ценообразования', time: '14:35' },
    { from: 'Product', to: 'Marketing', text: 'Проанализируй риски текущей модели', time: '14:36' },
    { from: 'Marketing', to: 'Finance', text: 'Предложены альтернативные подходы', time: '14:37' },
    { from: 'Finance', to: 'Management', text: 'Уточни и доработай подход', time: '14:38' },
    { from: 'Management', to: 'Product', text: 'Готов вариант с тремя тарифами', time: '14:40' },
];

const NOTES = [
    { time: '14:35 — Iteration 7', text: 'Фокус сместился на enterprise pricing model. LTV:CAC выглядит перспективно.' },
    { time: '14:42 — Red Team Input', text: 'Выявлен риск: SMB сегмент может быть недостаточно охвачен.' },
    { time: '14:50 — Checkpoint', text: 'Все агенты согласованы. Переходим к детализации трёхуровневой модели.' },
];

let currentPanel = null;
// animVariant removed — всегда slide
let speakingIdx = 0;

// ═══════════════════════════════════════════════
// THREE.JS — KIMI SHADERS + COCKPIT SCENE
// ═══════════════════════════════════════════════

let scene, camera, renderer, time = 0;
let mobiusMesh, mobiusMat;
let agentSpheres = [];
let energyParticles = [];

// Kimi Simplex noise (from production virtual-office.html)
const SNOISE_GLSL = `
    vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    float snoise(vec3 v){
        const vec2 C=vec2(1.0/6.0,1.0/3.0);
        const vec4 D=vec4(0.0,0.5,1.0,2.0);
        vec3 i=floor(v+dot(v,C.yyy));
        vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz);
        vec3 l=1.0-g;
        vec3 i1=min(g.xyz,l.zxy);
        vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx;
        vec3 x2=x0-i2+C.yyy;
        vec3 x3=x0-D.yyy;
        i=mod289(i);
        vec4 p=permute(permute(permute(
            i.z+vec4(0.0,i1.z,i2.z,1.0))
            +i.y+vec4(0.0,i1.y,i2.y,1.0))
            +i.x+vec4(0.0,i1.x,i2.x,1.0));
        float n_=0.142857142857;
        vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.0*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z);
        vec4 y_=floor(j-7.0*x_);
        vec4 x=x_*ns.x+ns.yyyy;
        vec4 y=y_*ns.x+ns.yyyy;
        vec4 h=1.0-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy);
        vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.0+1.0;
        vec4 s1=floor(b1)*2.0+1.0;
        vec4 sh=-step(h,vec4(0.0));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
        vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x);
        vec3 p1=vec3(a0.zw,h.y);
        vec3 p2=vec3(a1.xy,h.z);
        vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
        vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
        m=m*m;
        return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }
`;

// Kimi Agent Shader (Fresnel + Gradient + Pulse + Simplex noise)
function createAgentShader(baseColor) {
    return new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uBaseColor: { value: new THREE.Color(baseColor) },
            uCyan: { value: new THREE.Color(0x00E5FF) },
            uPurple: { value: new THREE.Color(0x7B2D8E) },
            uHover: { value: 0.0 },
            uActive: { value: 0.0 },
            uActiveIntensity: { value: 1.0 }
        },
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying vec3 vWorldPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform float uTime;
            uniform vec3 uBaseColor;
            uniform vec3 uCyan;
            uniform vec3 uPurple;
            uniform float uHover;
            uniform float uActive;
            uniform float uActiveIntensity;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying vec3 vWorldPosition;
            ${SNOISE_GLSL}
            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float fresnel = pow(1.0 - abs(dot(normal, viewDir)), 3.0);
                float gradientPos = dot(normal, vec3(0.0, 1.0, 0.0)) * 0.5 + 0.5;
                vec3 gradientColor = mix(uCyan, uPurple, gradientPos);
                vec3 finalColor = mix(uBaseColor, gradientColor, 0.3 + fresnel * 0.4);
                finalColor += fresnel * mix(uCyan, uPurple, fresnel) * 0.5;
                float hoverGlow = uHover * fresnel * 2.0;
                finalColor += uCyan * hoverGlow;
                if (uActive > 0.0) {
                    float pulse = sin(uTime * 4.0) * 0.5 + 0.5;
                    float activeRing = smoothstep(0.3, 0.5, abs(fresnel - pulse * 0.5)) * uActive;
                    finalColor += mix(uCyan, uPurple, pulse) * activeRing * uActiveIntensity;
                    float noise = snoise(vWorldPosition * 2.0 + uTime);
                    finalColor += vec3(noise * 0.1) * uActive;
                }
                vec3 lightDir = normalize(vec3(1.0, 1.0, 1.0));
                vec3 halfDir = normalize(lightDir + viewDir);
                float specAngle = max(dot(normal, halfDir), 0.0);
                float specular = pow(specAngle, 64.0) * (0.5 + uHover * 0.5);
                finalColor += vec3(specular);
                float alpha = 0.9 + fresnel * 0.1;
                gl_FragColor = vec4(finalColor, alpha);
            }
        `,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
}

// Kimi Halo Shader
function createHaloShader(color) {
    return new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(color) }, uTime: { value: 0 } },
        vertexShader: `varying vec3 vNormal; void main(){ vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
            uniform vec3 uColor; uniform float uTime; varying vec3 vNormal;
            void main(){
                float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
                float pulse = sin(uTime * 2.0) * 0.1 + 0.9;
                gl_FragColor = vec4(uColor, intensity * 0.5 * pulse);
            }
        `,
        transparent: true, side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
    });
}

function initThree() {
    const canvas = document.getElementById('three-canvas');
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0A0A0F, 0.012);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 4, 14);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // Lights
    scene.add(new THREE.AmbientLight(0x0A0A0F, 0.5));
    const l1 = new THREE.PointLight(0x00E5FF, 1.5, 60);
    l1.position.set(10, 12, 10);
    scene.add(l1);
    const l2 = new THREE.PointLight(0x7B2D8E, 1.0, 60);
    l2.position.set(-10, 6, -10);
    scene.add(l2);

    buildStarfield();
    buildMobius();
    buildAgentSpheres();
    buildEnergyParticles();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

function buildStarfield() {
    const count = 1500;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const cols = new Float32Array(count * 3);
    const palette = [new THREE.Color(0x00E5FF), new THREE.Color(0x7B2D8E), new THREE.Color(0xFFFFFF), new THREE.Color(0x8B8B9A)];
    for (let i = 0; i < count; i++) {
        const r = 30 + Math.random() * 100;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        const c = palette[Math.floor(Math.random() * palette.length)];
        cols[i*3] = c.r; cols[i*3+1] = c.g; cols[i*3+2] = c.b;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    const mat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false });
    const stars = new THREE.Points(geo, mat);
    stars.userData.isStarfield = true;
    scene.add(stars);
}

function buildMobius() {
    const geo = new THREE.BufferGeometry();
    const verts = [], uvs = [], indices = [];
    const R = 3, tube = 0.5, us = 100, vs = 24;
    for (let i = 0; i <= us; i++) {
        const u = (i / us) * Math.PI * 2;
        for (let j = 0; j <= vs; j++) {
            const v = (j / vs) * 2 - 1;
            const x = (R + tube * v * Math.cos(u / 2)) * Math.cos(u);
            const y = (R + tube * v * Math.cos(u / 2)) * Math.sin(u);
            const z = tube * v * Math.sin(u / 2);
            verts.push(x, y, z);
            uvs.push(i / us, j / vs);
        }
    }
    for (let i = 0; i < us; i++) {
        for (let j = 0; j < vs; j++) {
            const a = i * (vs + 1) + j;
            const b = (i + 1) * (vs + 1) + j;
            const c = (i + 1) * (vs + 1) + (j + 1);
            const d = i * (vs + 1) + (j + 1);
            indices.push(a, b, d, b, c, d);
        }
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    mobiusMat = new THREE.ShaderMaterial({
        uniforms: { uTime:{value:0}, uColor1:{value: new THREE.Color(0x00E5FF)}, uColor2:{value: new THREE.Color(0x7B2D8E)} },
        vertexShader: `varying vec2 vUv; varying vec3 vNormal; void main(){ vUv=uv; vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `
            uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2;
            varying vec2 vUv; varying vec3 vNormal;
            void main(){
                float flow = sin(vUv.x * 6.28318 + uTime * 0.5) * 0.5 + 0.5;
                vec3 color = mix(uColor1, uColor2, flow);
                vec3 viewDir = normalize(cameraPosition - vNormal);
                float fresnel = pow(1.0 - abs(dot(viewDir, vNormal)), 2.0);
                float alpha = 0.7 + fresnel * 0.3;
                gl_FragColor = vec4(color + fresnel * 0.3, alpha);
            }
        `,
        transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
    });
    mobiusMesh = new THREE.Mesh(geo, mobiusMat);
    mobiusMesh.rotation.x = Math.PI / 2;
    scene.add(mobiusMesh);

    // Core glow
    const coreGeo = new THREE.SphereGeometry(1.2, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x00E5FF, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
    scene.add(new THREE.Mesh(coreGeo, coreMat));

    // Glow ring around Mobius
    const ringGeo = new THREE.TorusGeometry(R, 0.04, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00E5FF, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
}

function buildAgentSpheres() {
    // 4 agent spheres floating above the Mobius, arranged in arc
    const SPHERE_R = 0.55;
    const ORBIT_R = 5.5;
    const Y_OFFSET = 1.5;

    AGENTS.forEach((agent, i) => {
        const group = new THREE.Group();

        // Angle: spread 4 agents in front arc (-45° to +45°)
        const angle = ((i - 1.5) / 3) * Math.PI * 0.5;
        const x = Math.sin(angle) * ORBIT_R;
        const z = Math.cos(angle) * ORBIT_R - 3;
        group.position.set(x, Y_OFFSET + Math.sin(i * 1.5) * 0.3, z);

        // Planet sphere with Kimi shader
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(SPHERE_R, 48, 48),
            createAgentShader(agent.color)
        );
        sphere.userData = { agentId: agent.id, agentIdx: i };
        group.add(sphere);

        // Halo
        const haloMat = createHaloShader(agent.color);
        const halo = new THREE.Mesh(new THREE.SphereGeometry(SPHERE_R * 1.6, 24, 24), haloMat);
        halo.userData = { isHalo: true };
        group.add(halo);

        // Label (sprite)
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 96;
        const ctx = canvas.getContext('2d');
        ctx.font = 'bold 32px Inter, sans-serif';
        const hex = '#' + agent.color.toString(16).padStart(6, '0');
        ctx.fillStyle = hex;
        ctx.textAlign = 'center';
        ctx.shadowColor = hex;
        ctx.shadowBlur = 12;
        ctx.fillText(agent.name, 128, 60);
        const tex = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8 });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(2.2, 0.85, 1);
        sprite.position.y = -SPHERE_R - 0.6;
        group.add(sprite);

        scene.add(group);
        agentSpheres.push({ group, sphere, haloMat, agent });

        // Set first agent as active
        if (i === 0) {
            sphere.material.uniforms.uActive.value = 1.0;
        }
    });
}

function buildEnergyParticles() {
    // Energy arcs between agents and center
    agentSpheres.forEach((as, i) => {
        const start = as.group.position.clone();
        const end = new THREE.Vector3(0, 0, 0);
        const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
        mid.y = 2.5 + Math.random();

        const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
        const pCount = 16;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(pCount * 3);
        const cols = new Float32Array(pCount * 3);
        const agentCol = new THREE.Color(as.agent.color);
        const cyanCol = new THREE.Color(0x00E5FF);
        for (let k = 0; k < pCount; k++) {
            const t = k / pCount;
            const pt = curve.getPoint(t);
            pos[k*3] = pt.x; pos[k*3+1] = pt.y; pos[k*3+2] = pt.z;
            const c = new THREE.Color().lerpColors(agentCol, cyanCol, t);
            cols[k*3] = c.r; cols[k*3+1] = c.g; cols[k*3+2] = c.b;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        const mat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false });
        const points = new THREE.Points(geo, mat);
        points.userData = { curve, progress: Math.random(), speed: 0.002 + Math.random() * 0.002 };
        energyParticles.push(points);
        scene.add(points);
    });
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    const t = time * 100;

    // Mobius rotation + shader
    if (mobiusMesh) {
        mobiusMesh.rotation.z = time * 0.08;
        mobiusMat.uniforms.uTime.value = t;
    }

    // Agent spheres: float + rotate + shader time
    agentSpheres.forEach((as, i) => {
        as.sphere.material.uniforms.uTime.value = t * 0.01;
        as.haloMat.uniforms.uTime.value = t * 0.01;
        as.sphere.rotation.y = time * 0.3 + i;

        // Gentle floating
        as.group.position.y = 1.5 + Math.sin(i * 1.5) * 0.3 + Math.sin(time * 0.7 + i * 2) * 0.15;
    });

    // Energy particles flow
    energyParticles.forEach(p => {
        p.userData.progress += p.userData.speed;
        if (p.userData.progress > 1) p.userData.progress = 0;
        const pos = p.geometry.attributes.position.array;
        const count = pos.length / 3;
        for (let k = 0; k < count; k++) {
            let tt = (k / count + p.userData.progress) % 1;
            const pt = p.userData.curve.getPoint(tt);
            pos[k*3] = pt.x; pos[k*3+1] = pt.y + Math.sin(t * 0.01 + k) * 0.1; pos[k*3+2] = pt.z;
        }
        p.geometry.attributes.position.needsUpdate = true;
    });

    // Starfield rotation
    scene.children.forEach(c => { if (c.userData.isStarfield) c.rotation.y = time * 0.012; });

    // Camera gentle sway
    camera.position.x = Math.sin(time * 0.15) * 0.3;
    camera.position.y = 4 + Math.sin(time * 0.2) * 0.15;
    camera.lookAt(0, 0.5, 0);

    renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
// DOCK & PANELS
// ═══════════════════════════════════════════════

function renderDock() {
    const bar = document.getElementById('dock-bar');

    bar.innerHTML = PANELS_CFG.map(p => `
        <button class="dock-btn ${currentPanel===p.id?'active':''}"
                style="--panel-color:${p.color}; --panel-glow:${p.glow}; --ac:${p.color}"
                onclick="${p.id === 'notes' ? "window.location.href=\'../adaptive-mode/index.html\'" : "togglePanel(\'"+p.id+"\')"}">
            ${p.notif && currentPanel !== p.id ? '<div class="dock-notif"></div>' : ''}
            <div class="dock-icon">${kimiMicro()}</div>
            <div class="dock-label">${p.label}</div>
            <div class="dock-indicator"></div>
        </button>
    `).join('');
}

function renderPanelContent(id) {
    const cfg = PANELS_CFG.find(p => p.id === id);
    const container = document.getElementById('panel-container');
    container.style.setProperty('--panel-accent', cfg.color);

    let header = `<div class="panel-header"><div class="panel-title">${cfg.label}</div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
    let body = '';

    switch(id) {
        case 'avatars':
            body = `<div class="avatar-grid">${AGENTS.map(a => {
                const statusColor = a.status === 'active' ? 'var(--green)' : a.status === 'processing' ? 'var(--amber)' : 'var(--gray-text)';
                return `
                <div class="avatar-card" onclick="focusAgent('${a.id}')">
                    <div class="avatar-card-sphere" style="--ac:${a.hexColor}">${kimiOrbital()}</div>
                    <div class="avatar-card-name" style="color:${a.hexColor}">${a.name}</div>
                    <div class="avatar-card-role">${a.model}</div>
                    <div class="avatar-card-status" style="color:${statusColor}">
                        <span class="status-indicator" style="background:${statusColor}; box-shadow: 0 0 6px ${statusColor}"></span>
                        ${a.status}
                    </div>
                </div>`;
            }).join('')}</div>`;
            break;
        case 'comm':
            body = `
                <div class="routing-row">
                    ${['All','Product','Finance','Marketing','Management','Human→AI','AI→AI'].map((r,i) =>
                        `<button class="route-chip ${i===0?'active':''}" onclick="this.parentElement.querySelectorAll('.route-chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">${r}</button>`
                    ).join('')}
                </div>
                <div class="panel-body">
                    ${MESSAGES.map(m => `
                        <div class="comm-msg">
                            <div class="comm-route">${m.from}<span class="arr"> → </span>${m.to}</div>
                            <div class="comm-body"><div class="comm-topic">${m.text}</div></div>
                            <div class="comm-time">${m.time}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="comm-input-row">
                    <input class="comm-input" placeholder="Маршрутизировать сообщение…" />
                    <button class="comm-send">Send</button>
                </div>
            `;
            break;
        case 'code':
            body = `
                <div class="terminal-tabs">
                    <button class="terminal-tab active">Claude Code</button>
                    <button class="terminal-tab">ChatGPT</button>
                    <button class="terminal-tab">Kimi</button>
                    <button class="terminal-tab">Qwen</button>
                </div>
                <div class="terminal-output">
                    <div class="t-g">$ analyzing business_model.py</div>
                    <div class="t-d" style="margin-top:8px">Loading hypothesis validation...</div>
                    <div class="t-b" style="margin-top:4px">→ LTV:CAC ratio: 8.3 ✓</div>
                    <div class="t-b">→ Churn rate: 12% ✓</div>
                    <div class="t-y" style="margin-top:8px">⚠ Warning: Enterprise segment underexplored</div>
                    <div class="t-c" style="margin-top:8px">→ Running competitive analysis module...</div>
                    <div class="t-d" style="margin-top:8px"><span class="cursor-blink">▌</span></div>
                </div>
            `;
            break;
        case 'input':
            body = `
                <textarea class="input-area" placeholder="Введите команду, вопрос или направление для обсуждения…"></textarea>
                <div class="input-controls">
                    <button class="input-mode-btn" title="Voice"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
                    <button class="input-mode-btn" title="Camera"><svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></button>
                    <button class="input-mode-btn" title="Gesture"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></button>
                    <button class="input-send-btn">➤ Send to Coordinator</button>
                </div>
            `;
            break;
        case 'notes':
            body = `
                <div class="notes-tabs">
                    <button class="notes-tab active" onclick="showNotes('journal',this)">Journal</button>
                    <button class="notes-tab" onclick="showNotes('docs',this)">Docs</button>
                    <button class="notes-tab" onclick="showNotes('vision',this)">Vision</button>
                </div>
                <div class="panel-body" id="notes-body">
                    ${NOTES.map(n => `<div class="note-entry"><div class="note-time">${n.time}</div><div class="note-text">${n.text}</div></div>`).join('')}
                </div>
            `;
            break;
    }

    document.getElementById('panel-inner').innerHTML = header + '<div class="panel-body">' + body + '</div>';
}

function showNotes(view, btn) {
    document.querySelectorAll('.notes-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const el = document.getElementById('notes-body');
    if (view === 'journal') {
        el.innerHTML = NOTES.map(n => `<div class="note-entry"><div class="note-time">${n.time}</div><div class="note-text">${n.text}</div></div>`).join('');
    } else if (view === 'docs') {
        el.innerHTML = ['Business Model Canvas','Hypothesis Log','Run Config','Debrief Notes'].map(d =>
            `<div class="note-entry" style="cursor:pointer"><div class="note-time" style="color:var(--amber)">📄</div><div class="note-text">${d}</div></div>`
        ).join('');
    } else {
        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--gray-text);font-size:12px;opacity:0.5">Camera feed — visual context for AI agents</div>';
    }
}

// ═══════════════════════════════════════════════
// PANEL ANIMATION
// ═══════════════════════════════════════════════

function togglePanel(id) {
    if (currentPanel === id) closePanel();
    else openPanel(id);
}

function openPanel(id) {
    currentPanel = id;
    renderPanelContent(id);
    renderDock();

    const panel = document.getElementById('panel-container');
    const backdrop = document.getElementById('panel-backdrop');

    backdrop.classList.add('visible');

    gsap.fromTo(panel, {
        y: '120%', opacity: 0, scale: 1
    }, {
        y: '0%', opacity: 1, scale: 1,
        duration: 0.55,
        ease: 'back.out(1.2)',
    });
}

function closePanel() {
    const panel = document.getElementById('panel-container');
    const backdrop = document.getElementById('panel-backdrop');
    backdrop.classList.remove('visible');

    gsap.to(panel, {
        y: '120%', opacity: 0,
        duration: 0.35,
        ease: 'power2.in',
        onComplete: () => { currentPanel = null; renderDock(); }
    });
}

// ═══════════════════════════════════════════════
// STAGE PANELS — derived from Navigator 3-panel widget
// Stage 1 = Core (central intelligence nexus)
function focusAgent(id) {
    const idx = AGENTS.findIndex(a => a.id === id);
    if (idx < 0) return;
    // Deactivate previous
    agentSpheres.forEach((as, i) => {
        gsap.to(as.sphere.material.uniforms.uActive, { value: i === idx ? 1.0 : 0.0, duration: 0.4 });
    });
    speakingIdx = idx;
    if (currentPanel !== 'avatars') openPanel('avatars');
}

// setVariant removed — анимация всегда slide

// ═══════════════════════════════════════════════
// CLOCK & INIT
// ═══════════════════════════════════════════════

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && currentPanel) closePanel(); });

// Loader
let progress = 0;
const loadInterval = setInterval(() => {
    progress += Math.random() * 25 + 10;
    if (progress > 100) progress = 100;
    document.getElementById('loader-fill').style.width = progress + '%';
    if (progress >= 100) {
        clearInterval(loadInterval);
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
    }
}, 180);

// Init
renderDock();
updateClock();
setInterval(updateClock, 1000);
initThree();
</script>

<button class="fs-btn" id="fsBtn" title="Fullscreen">
<svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
</button>
<script>
(function(){
  var btn=document.getElementById("fsBtn");
  var expand='<path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>';
  var shrink='<path d="M4 14h3a2 2 0 012 2v3m2-16v3a2 2 0 01-2 2H4m16 2h-3a2 2 0 01-2-2V4m2 16v-3a2 2 0 012-2h3"/>';
  function isFS(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
  function goFS(){var e=document.documentElement;(e.requestFullscreen||e.webkitRequestFullscreen).call(e)}
  function exitFS(){(document.exitFullscreen||document.webkitExitFullscreen).call(document)}
  function upd(){btn.querySelector("svg").innerHTML=isFS()?shrink:expand;if(isFS()){localStorage.setItem('ai3fs','1')}else{localStorage.removeItem('ai3fs')}}
  btn.onclick=function(){if(isFS()){exitFS()}else{goFS()}};
  document.addEventListener("fullscreenchange",upd);document.addEventListener("webkitfullscreenchange",upd);
  if(localStorage.getItem('ai3fs')){document.addEventListener("click",function once(){goFS();document.removeEventListener("click",once)},{once:true})}
})();
</script>
