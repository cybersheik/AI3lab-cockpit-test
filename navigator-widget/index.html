<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI³ Infinity Cube v7 — PNG + 3D Cube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0F;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #wrapper {
            position: relative;
            width: 600px;
            height: 600px;
            cursor: pointer;
        }
        #main-canvas { width: 100%; height: 100%; display: block; }
        #mini-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 160px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }
        #mini-label {
            position: fixed;
            bottom: 4px;
            right: 20px;
            color: rgba(0,229,255,0.4);
            font-size: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="wrapper"><canvas id="main-canvas"></canvas></div>
    <div id="mini-preview"><canvas id="mini-canvas"></canvas></div>
    <div id="mini-label">~160px preview</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }

    // AI³ INFINITY CUBE v7
    // Original PNG logo as texture + real 3D cube overlay
    // The ribbon IS the original artwork — pixel-perfect
    // The cube is a 3D object that replaces the flat cube in the PNG
    // ═══════════════════════════════════════════════════════════════

    const canvas = document.getElementById('main-canvas');
    const SIZE = 600;

    let isHovered = false;
    let hoverT = 0;
    let time = 0;

    // ── PARALLAX STATE ──
    let targetRotX = 0;
    let targetRotY = 0;
    let currentRotX = 0;
    let currentRotY = 0;
    const PARALLAX_STRENGTH = 0.80; // max tilt in radians (~45°)
    const PARALLAX_LERP = 0.08;    // smoothing speed

    // ── PORTAL CLICK STATE ──
    let portalActive = false;
    let portalProgress = 0;
    let portalTargetUrl = '../navigator-inner/index.html';

    // ── RENDERER ──
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(SIZE, SIZE);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0A0A0F, 1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;

    // ── SCENE ──
    const scene = new THREE.Scene();

    // ── CAMERA — orthographic-like perspective for logo feel ──
    const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
    camera.position.set(0, 0, 8);
    camera.lookAt(0, 0, 0);

    // ── LIGHTS ──
    scene.add(new THREE.AmbientLight(0x445566, 1.2));

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
    keyLight.position.set(2, 4, 5);
    scene.add(keyLight);

    const cyanLight = new THREE.PointLight(0x00E5FF, 1.5, 12);
    cyanLight.position.set(3, 1, 3);
    scene.add(cyanLight);

    const purpleLight = new THREE.PointLight(0x7B2D8E, 1.0, 12);
    purpleLight.position.set(-3, -1, 2);
    scene.add(purpleLight);

    // MASTER GROUP
    // ═══════════════════════════════════════════════════════════════

    scene.add(masterGroup);

        opacity: 0.5
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    core.position.copy(cube.position);
    masterGroup.add(core);

    const coreGlowMat = new THREE.MeshBasicMaterial({
        color: 0x00E5FF,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending
    });
    const coreGlow = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 10), coreGlowMat);
    coreGlow.position.copy(cube.position);
    masterGroup.add(coreGlow);

    // ═══════════════════════════════════════════════════════════════
    // SHIMMER — energy pulse that travels across the logo surface
    // Uses a small bright point that moves in a lemniscate path
    // matching the ribbon trajectory
    // ═══════════════════════════════════════════════════════════════

    function lemniscatePoint2D(t, scale) {
        const s = Math.sin(t);
        const c = Math.cos(t);
        const d = 1 + s * s;
        return {
            x: scale * c / d,
            y: scale * s * c / d * 0.55  // squashed to match logo proportions
        };
    }

    const shimmerGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const shimmerMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.0,
        blending: THREE.AdditiveBlending
    });
    const shimmerMesh = new THREE.Mesh(shimmerGeo, shimmerMat);
    masterGroup.add(shimmerMesh);

    const shimmerGlowGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const shimmerGlowMaterial = new THREE.MeshBasicMaterial({
        color: 0x00E5FF,
        transparent: true,
        opacity: 0.0,
        blending: THREE.AdditiveBlending
    });
    const shimmerGlowMesh = new THREE.Mesh(shimmerGlowGeo, shimmerGlowMaterial);
    masterGroup.add(shimmerGlowMesh);

    // ═══════════════════════════════════════════════════════════════
    // ANIMATION
    // ═══════════════════════════════════════════════════════════════

    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;

        const targetH = isHovered ? 1.0 : 0.0;
        hoverT += (targetH - hoverT) * 0.05;

        // ── PARALLAX + IDLE DRIFT ──
        // Parallax from mouse/touch/gyro is the primary motion
        // Idle drift adds gentle life when nobody interacts
        currentRotX += (targetRotX - currentRotX) * PARALLAX_LERP;
        currentRotY += (targetRotY - currentRotY) * PARALLAX_LERP;

        const idleDriftY = Math.sin(time * 0.1) * 0.05;
        const idleDriftX = Math.sin(time * 0.08) * 0.02;

        masterGroup.rotation.y = currentRotY + idleDriftY;
        masterGroup.rotation.x = currentRotX + idleDriftX;

        // ── CUBE — real 3D rotation, independent of logo ──
        cube.rotation.z = Math.PI / 4 + Math.sin(time * 0.3) * 0.02;
        cube.rotation.y = time * 0.15;  // slow continuous spin — shows 3D depth
        cube.rotation.x = Math.sin(time * 0.25) * 0.1;

        // Sync edge wireframe with cube
        cubeEdges.rotation.copy(cube.rotation);

        // Cube breathing
        const breath = 1 + Math.sin(time * 0.5) * 0.02;
        cube.scale.setScalar(breath);
        cubeEdges.scale.setScalar(breath);

        // Cube material responds to hover
        cubeMat.emissiveIntensity = 0.3 + hoverT * 0.5;
        cubeEdgeMat.opacity = 0.5 + hoverT * 0.4;

        // Core pulse
        const corePulse = Math.sin(time * 0.6) * 0.3 + 0.7;
        coreMat.opacity = (0.4 + hoverT * 0.4) * corePulse;
        core.scale.setScalar(0.8 + corePulse * 0.3);
        coreGlowMat.opacity = (0.1 + hoverT * 0.15) * corePulse;
        coreGlow.scale.setScalar(1 + corePulse * 0.2);

        // ── LOGO GLOW on hover ──
        glowMat.opacity = hoverT * 0.2;

        // ── SHIMMER — travels lemniscate path ──
        const shimT = time * 0.4;
        const shimPos = lemniscatePoint2D(shimT, 1.35);
        shimmerMesh.position.set(shimPos.x, shimPos.y - 0.1, 0.05);
        shimmerGlowMesh.position.copy(shimmerMesh.position);

        const shimOp = 0.3 + hoverT * 0.5;
        shimmerMat.opacity = shimOp;
        shimmerGlowMaterial.opacity = shimOp * 0.4;

        // Color follows position
        const colorT = Math.max(0, Math.min(1, (shimPos.x + 1.35) / 2.7));
        shimmerMat.color.setHex(colorT > 0.5 ? 0x00E5FF : 0x9944CC);
        shimmerGlowMaterial.color.copy(shimmerMat.color);

        // ── LIGHTS ──
        cyanLight.intensity = 1.2 + hoverT * 1.0;
        purpleLight.intensity = 0.8 + hoverT * 0.6;

        // ── PORTAL ANIMATION — zoom into cube on click ──
        if (portalActive) {
            portalProgress += 0.02;
            const p = Math.min(portalProgress, 1.0);
            const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic

            // Camera zooms toward cube center
            camera.position.z = 8 - eased * 7.2;
            camera.position.y = eased * cube.position.y * 0.5;

            // Scene brightens to white
            renderer.toneMappingExposure = 1.6 + eased * 8;

            // Cube glows intensely
            cubeMat.emissiveIntensity = 0.5 + eased * 5;
            coreMat.opacity = 0.5 + eased * 0.5;
            coreGlowMat.opacity = 0.15 + eased * 0.85;

            if (p >= 1.0 && portalTargetUrl) {
                // If inside iframe — postMessage to parent for navigation
                if (window !== window.top) {
                    window.parent.postMessage({ type: 'portal-navigate', url: portalTargetUrl }, '*');
                } else {
                    window.location.href = portalTargetUrl;
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    // ═══════════════════════════════════════════════════════════════
    // INTERACTION — parallax (mouse + touch + gyro) + portal click
    // ═══════════════════════════════════════════════════════════════
    const wrapper = document.getElementById('wrapper');

    // ── HOVER ──
    wrapper.addEventListener('mouseenter', () => { isHovered = true; });
    wrapper.addEventListener('mouseleave', () => { isHovered = false; });

    // ── MOUSE PARALLAX — whole window, works with trackpad ──
    const hoverRaycaster = new THREE.Raycaster();
    const hoverMouse = new THREE.Vector2();

    document.addEventListener('mousemove', (e) => {
        // Parallax
        const nx = (e.clientX / window.innerWidth) * 2 - 1;
        const ny = (e.clientY / window.innerHeight) * 2 - 1;
        targetRotY = nx * PARALLAX_STRENGTH;
        targetRotX = -ny * PARALLAX_STRENGTH;

        // Cursor change on cube hover
        const rect = canvas.getBoundingClientRect();
        hoverMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        hoverMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        hoverRaycaster.setFromCamera(hoverMouse, camera);
        const hits = hoverRaycaster.intersectObject(cube);
        wrapper.style.cursor = hits.length > 0 ? 'pointer' : 'default';
    });

    // ── TOUCH PARALLAX (mobile finger) ──
    wrapper.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = wrapper.getBoundingClientRect();
        const nx = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
        const ny = ((touch.clientY - rect.top) / rect.height) * 2 - 1;
        targetRotY = nx * PARALLAX_STRENGTH;
        targetRotX = -ny * PARALLAX_STRENGTH;
    }, { passive: false });

    wrapper.addEventListener('touchstart', () => { isHovered = true; });
    wrapper.addEventListener('touchend', () => {
        isHovered = false;
        targetRotX = 0;
        targetRotY = 0;
    });

    // ── GYROSCOPE (mobile device tilt — works without touching) ──
    if (window.DeviceOrientationEvent) {
        // Request permission on iOS 13+
        const requestGyro = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleGyro);
                        }
                    });
            } else {
                window.addEventListener('deviceorientation', handleGyro);
            }
        };

        function handleGyro(e) {
            if (portalActive) return;
            // beta = front-back tilt (-180..180), gamma = left-right tilt (-90..90)
            const beta = e.beta || 0;
            const gamma = e.gamma || 0;
            // Normalize: phone held at ~45° is "neutral"
            const nx = Math.max(-1, Math.min(1, gamma / 30));
            const ny = Math.max(-1, Math.min(1, (beta - 45) / 30));
            targetRotY = nx * PARALLAX_STRENGTH;
            targetRotX = -ny * PARALLAX_STRENGTH;
        }

        // Auto-request on first touch (needed for iOS)
        wrapper.addEventListener('touchstart', requestGyro, { once: true });
        // Also try immediately for Android
        requestGyro();
    }

    // ── PORTAL CLICK — only triggers when clicking the cube ──
    const raycaster = new THREE.Raycaster();
    const clickMouse = new THREE.Vector2();

    wrapper.addEventListener('click', (e) => {
        if (portalActive) return;

        // Convert click to normalized device coordinates
        const rect = canvas.getBoundingClientRect();
        clickMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        clickMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(clickMouse, camera);
        const hits = raycaster.intersectObject(cube);

        if (hits.length > 0) {
            // Hit the cube — activate portal!
            portalActive = true;
            portalProgress = 0;

            if (!portalTargetUrl) {
                setTimeout(() => {
                    portalActive = false;
                    portalProgress = 0;
                    camera.position.set(0, 0, 8);
                    renderer.toneMappingExposure = 1.6;
                    cubeMat.emissiveIntensity = 0.3;
                    coreMat.opacity = 0.5;
                    coreGlowMat.opacity = 0.15;
                }, 1200);
            }
        }
    });

    // ── MINI PREVIEW ──
    const miniCanvas = document.getElementById('mini-canvas');
    const miniRenderer = new THREE.WebGLRenderer({ canvas: miniCanvas, antialias: true });
    miniRenderer.setSize(160, 160);
    miniRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    miniRenderer.setClearColor(0x0A0A0F, 1);
    miniRenderer.toneMapping = THREE.ACESFilmicToneMapping;
    miniRenderer.toneMappingExposure = 1.6;

    function animateMini() {
        requestAnimationFrame(animateMini);
        miniRenderer.render(scene, camera);
    }
    animateMini();

    </script>
</body>
</html>
