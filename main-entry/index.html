<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI³ Navigator — Intelligence Topology</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#00D9FF;--purple:#BD00FF;--purple-deep:#7B2D8E;--orange:#FF6B2B;
  --bg:#0F1923;
  --glass:rgba(14,22,38,0.55);
  --text:#e8eaf0;--dim:#9aa3bf;--faint:#4d5570;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(165deg,#0F1923 0%,#142033 45%,#1A1528 100%);font-family:'Inter',sans-serif;color:var(--text)}

#three-canvas{position:fixed;inset:0;z-index:0;cursor:grab}
#three-canvas:active{cursor:grabbing}

.scan-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 35% 50%, rgba(0,217,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 65% 60%, rgba(123,45,142,0.03) 0%, transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,217,255,0.006) 2px,rgba(0,217,255,0.006) 4px);
}

.ui{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;pointer-events:none}
.header,.footer,.art-panel,.art-panel *{pointer-events:auto}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 48px;
  background:linear-gradient(180deg,rgba(15,25,35,0.92) 0%,rgba(15,25,35,0.5) 60%,transparent 100%);
  border-bottom:1px solid rgba(0,217,255,0.1);
}
.logo{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:400;
  letter-spacing:8px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(0,217,255,0.3));
}
.header-right{display:flex;align-items:center;gap:24px}
.header-right span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}
.header-right .status-dot{
  width:6px;height:6px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan),0 0 16px rgba(0,217,255,0.3);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.8)}}

.main{flex:1;display:grid;grid-template-columns:1fr 340px;gap:0;padding:0 48px 24px;align-items:center}

/* Art panel */
.art-panel{
  display:flex;flex-direction:column;gap:14px;padding:0 0 0 28px;
  border-left:1px solid rgba(0,217,255,0.08);height:100%;justify-content:center;
}
.art-section-title{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:5px;text-transform:uppercase;color:var(--dim);
  margin-bottom:8px;text-shadow:0 0 10px rgba(0,217,255,0.15);
}
.art-card{
  cursor:pointer;position:relative;overflow:hidden;
  border:1px solid rgba(0,217,255,0.12);border-radius:4px;
  background:var(--glass);backdrop-filter:blur(20px);
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 2px 20px rgba(0,0,0,0.3);
}
.art-card:hover{
  border-color:rgba(0,217,255,0.35);transform:translateX(-4px);
  box-shadow:0 0 30px rgba(0,217,255,0.1),0 4px 30px rgba(0,0,0,0.4);
}
.art-card:hover .art-accent{opacity:1;box-shadow:0 0 8px rgba(0,217,255,0.4)}
.art-card:hover .art-title{color:var(--cyan);text-shadow:0 0 8px rgba(0,217,255,0.4)}
.art-accent{position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(180deg,var(--cyan),var(--purple));opacity:0.5;transition:all 0.3s}
.art-info{padding:16px 20px 8px}
.art-index{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);letter-spacing:2px;margin-bottom:4px}
.art-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--dim);transition:all 0.3s}
.art-desc{font-size:10px;color:rgba(232,234,240,0.35);line-height:1.5;font-weight:300;margin-top:4px}
.art-canvas-wrap{width:100%;height:72px;position:relative;overflow:hidden;border-top:1px solid rgba(0,217,255,0.04)}

.footer{
  display:flex;justify-content:space-between;align-items:center;padding:14px 48px;
  background:linear-gradient(0deg,rgba(15,25,35,0.92) 0%,rgba(15,25,35,0.5) 60%,transparent 100%);
  border-top:1px solid rgba(0,217,255,0.08);
}
.footer span{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);letter-spacing:3px}

.tip{
  position:fixed;pointer-events:none;z-index:100;padding:8px 16px;
  background:rgba(10,15,30,0.85);border:1px solid rgba(0,217,255,0.25);border-radius:3px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan);
  letter-spacing:1px;opacity:0;transition:opacity 0.15s;
  backdrop-filter:blur(16px);box-shadow:0 0 20px rgba(0,217,255,0.1),0 4px 20px rgba(0,0,0,0.4);
}
.flash{position:fixed;inset:0;z-index:50;pointer-events:none}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div class="scan-overlay"></div>

<div class="ui">
  <div class="header">
    <div class="logo">AI³ Venture Engine</div>
    <div class="header-right">
      <div class="status-dot"></div>
      <span>Navigator</span>
      <span id="clock">00:00:00</span>
    </div>
  </div>
  <div class="main">
    <div style="position:relative;width:100%;height:100%"></div>
    <div class="art-panel">
      <div class="art-section-title">Subsystems</div>
      <div id="artCards"></div>
    </div>
  </div>
  <div class="footer">
    <span>AI3Lab — Lord of Design</span>
    <span>Intelligence Topology v0.8</span>
  </div>
</div>
<div class="tip" id="tip"></div>

<script>
const SPACES = [
  { id:'cockpit',   label:'Cockpit',    desc:'Command bridge',      glyph:'CP', color:0x00D9FF,
    full:'Strategic command center. Monitor agents, review decisions, steer the venture engine.',
    href:'../cockpit/index.html' },
  { id:'team-hall', label:'Team-Hall',  desc:'Agent collaboration', glyph:'TH', color:0xBD00FF,
    full:'Collaborative space where AI agents meet, debate, and co-create in real time.',
    href:'../team-hall/index.html' },
  { id:'comm-hub',  label:'Command Hall',desc:'Agent command center', glyph:'CH', color:0x00D9FF,
    full:'Command center for agent coordination. Plan, communicate, and orchestrate operations.',
    href:'../command-hall/index.html' },
  { id:'engine',    label:'Engine',     desc:'AI core',              glyph:'EN', color:0xFF6B2B,
    full:'The intelligence core. Neural processing, model orchestration, and inference pipelines.',
    href:'../engine/index.html' },
  { id:'wheelhouse',label:'Wheelhouse', desc:'Navigation control',  glyph:'WH', color:0xBD00FF,
    full:'Navigation and strategy room. Chart courses, set priorities, manage venture trajectories.',
    href:'../wheelhouse/index.html' },
];
const ARTS = [
  { id:'core',   label:'Core',   desc:'Central intelligence nexus' },
  { id:'system', label:'System', desc:'Distributed framework' },
  { id:'process',label:'Process',desc:'Workflow pipeline' },
];

// ── ART CARDS + P5 ──
const p5Instances = {};
function buildArtCards(){
  const wrap = document.getElementById('artCards');
  ARTS.forEach((art,i)=>{
    const card = document.createElement('div');
    card.className='art-card'; card.style.opacity='0';
    card.innerHTML=`<div class="art-accent"></div><div class="art-info"><div class="art-index">0${i+1}</div><div class="art-title">${art.label}</div><div class="art-desc">${art.desc}</div></div><div class="art-canvas-wrap" id="p5-${art.id}"></div>`;
    wrap.appendChild(card);
    gsap.to(card,{opacity:1,delay:0.6+i*0.18,duration:0.7,ease:'power2.out'});
    gsap.from(card,{x:40,delay:0.6+i*0.18,duration:0.9,ease:'power3.out'});
  });
  setTimeout(()=>{
    p5Instances.core=new p5(skCore,document.getElementById('p5-core'));
    p5Instances.system=new p5(skSystem,document.getElementById('p5-system'));
    p5Instances.process=new p5(skProcess,document.getElementById('p5-process'));
  },300);
}
function skCore(p){
  const N=150;let pts=[];
  p.setup=function(){p.createCanvas(300,72).style('display','block');p.noStroke();
    for(let i=0;i<N;i++){const a=p.random(p.TWO_PI),r=p.random(6,34);
      pts.push({a,r,sp:p.map(r,6,34,0.045,0.01),sz:p.map(r,6,34,2.8,0.8),ph:p.random(p.TWO_PI)})}};
  p.draw=function(){p.clear();const cx=p.width/2,cy=p.height/2,t=p.frameCount*0.01;
    for(let pt of pts){pt.a+=pt.sp;const r=pt.r*(1+Math.sin(t*2+pt.ph)*0.15);
      const x=cx+Math.cos(pt.a)*r*(p.width/72),y=cy+Math.sin(pt.a)*r;
      const e=p.map(pt.r,6,34,1,0);
      if(e>0.6)p.fill(0,217,255,180+e*70);else if(e>0.3)p.fill(120,60,220,120+e*80);else p.fill(189,0,255,60+e*60);
      p.ellipse(x,y,pt.sz,pt.sz)}
    for(let i=5;i>0;i--){p.fill(0,217,255,12*i);p.ellipse(cx,cy,i*7,i*7)}
    p.fill(200,240,255,60);p.ellipse(cx,cy,4,4)};
}
function skSystem(p){
  const cols=30,rows=5;let ph=[],nf=[];const K=2.8;
  p.setup=function(){p.createCanvas(300,72).style('display','block');p.noStroke();
    for(let r=0;r<rows;r++){ph[r]=[];nf[r]=[];for(let c=0;c<cols;c++){ph[r][c]=p.random(p.TWO_PI);nf[r][c]=p.random(-0.3,0.3)}}};
  p.draw=function(){p.clear();let np=ph.map(r=>[...r]);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){let s=0,n=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols){s+=Math.sin(ph[nr][nc]-ph[r][c]);n++}}
      np[r][c]=ph[r][c]+0.02*(nf[r][c]+(K/n)*s)}
    ph=np;const gX=p.width/(cols+1),gY=p.height/(rows+1);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const x=gX*(c+1),y=gY*(r+1),b=(Math.sin(ph[r][c])+1)*0.5;
      if(b>0.65)p.fill(0,217,255,80+b*175);else if(b>0.35)p.fill(140,80,255,60+b*120);else p.fill(189,0,255,30+b*60);
      p.ellipse(x,y,1.5+b*3.5,1.5+b*3.5);
      if(c<cols-1&&Math.abs(Math.sin(ph[r][c])-Math.sin(ph[r][c+1]))<0.18){p.stroke(0,217,255,50);p.strokeWeight(0.6);p.line(x,y,gX*(c+2),y);p.noStroke()}}};
}
function skProcess(p){
  const N=100;let pts=[];
  function sp(){return{x:p.random(-20,0),y:p.random(6,66),vx:p.random(0.5,2),vy:0,sz:p.random(1,2.8)}}
  p.setup=function(){p.createCanvas(300,72).style('display','block');p.noStroke();for(let i=0;i<N;i++)pts.push(sp())};
  p.draw=function(){p.fill(13,15,26,45);p.rect(0,0,p.width,p.height);const t=p.frameCount*0.008;
    for(let pt of pts){const a=p.noise(pt.x*0.012,pt.y*0.03,t)*p.TWO_PI*2-p.PI,f=p.noise(pt.x*0.024,pt.y*0.06,t*0.5)*0.8;
      pt.vx+=Math.cos(a)*f*0.1+0.06;pt.vy+=Math.sin(a)*f*0.15;pt.vx*=0.96;pt.vy*=0.94;pt.x+=pt.vx;pt.y+=pt.vy;
      if(pt.y<4){pt.y=4;pt.vy*=-0.5}if(pt.y>68){pt.y=68;pt.vy*=-0.5}
      const s=Math.sqrt(pt.vx*pt.vx+pt.vy*pt.vy);
      if(s>1.2)p.fill(0,217,255,200);else if(s>0.7)p.fill(255,107,43,170);else p.fill(189,0,255,100);
      p.ellipse(pt.x,pt.y,pt.sz,pt.sz);if(pt.x>p.width+10)Object.assign(pt,sp())}};
}

// ── GLYPH TEXTURE HELPER (top-level so animate() can access) ──
function makeGlyphTexture(text,hexColor){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  const grad=ctx.createRadialGradient(64,64,0,64,64,54);
  const col='#'+hexColor.toString(16).padStart(6,'0');
  grad.addColorStop(0,col+'40');grad.addColorStop(0.6,col+'15');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(64,64,54,0,Math.PI*2);ctx.fill();
  ctx.font='700 42px JetBrains Mono, monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=16;
  ctx.fillText(text,64,64);
  ctx.shadowBlur=8;ctx.fillText(text,64,64);
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;return tex;
}
let glyphPackets=[];

// ── THREE.JS — Central Wireframe Sphere + Orbiting Stations ──
let scene,camera,renderer,clk;
let centralSphere,centralWire,centralGlow,mobiusMesh,bgParticles,nebulaPlane;
let stationGroups=[],connectionLines=[],dataParticles=[];
const CENTER=new THREE.Vector3(-2.2,0.5,0);

function initThree(){
  const canvas=document.getElementById('three-canvas');
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
  camera.position.set(-1.0,1.5,8); camera.lookAt(-1.0,0.5,0);
  clk=new THREE.Clock();
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x0F1923,1);

  // Nebula
  const nebMat=new THREE.ShaderMaterial({
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`uniform float uTime;varying vec2 vUv;void main(){vec2 p=vUv-0.5;float g1=exp(-dot(p-vec2(-0.15,0.1),p-vec2(-0.15,0.1))*5.0)*0.10;float g2=exp(-dot(p-vec2(0.2,-0.08),p-vec2(0.2,-0.08))*6.0)*0.07;float g3=exp(-dot(p-vec2(0.05,0.0),p-vec2(0.05,0.0))*3.0)*0.035;float pulse=0.5+0.5*sin(uTime*0.3);vec3 c=vec3(0.0,0.85,1.0)*g1*(0.7+pulse*0.3)+vec3(0.48,0.0,1.0)*g2+vec3(1.0,0.42,0.17)*g3;gl_FragColor=vec4(c,g1+g2+g3*0.5);}`,
    uniforms:{uTime:{value:0}},transparent:true,depthWrite:false});
  nebulaPlane=new THREE.Mesh(new THREE.PlaneGeometry(30,20),nebMat);
  nebulaPlane.position.z=-8; scene.add(nebulaPlane);

  // BG particles
  const N=500,pG=new THREE.BufferGeometry(),pos=new Float32Array(N*3),col=new Float32Array(N*3),siz=new Float32Array(N);
  const cC=new THREE.Color(0x00D9FF),cP=new THREE.Color(0xBD00FF);
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-0.5)*20;pos[i*3+1]=(Math.random()-0.5)*12;pos[i*3+2]=(Math.random()-0.5)*8-3;
    const c=cC.clone().lerp(cP,Math.random());col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;siz[i]=0.8+Math.random()*2.5}
  pG.setAttribute('position',new THREE.BufferAttribute(pos,3));
  pG.setAttribute('color',new THREE.BufferAttribute(col,3));
  pG.setAttribute('size',new THREE.BufferAttribute(siz,1));
  bgParticles=new THREE.Points(pG,new THREE.ShaderMaterial({
    vertexShader:`attribute float size;varying vec3 vColor;void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(180.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying vec3 vColor;void main(){float d=length(gl_PointCoord-0.5);if(d>0.5)discard;gl_FragColor=vec4(vColor,smoothstep(0.5,0.02,d)*0.5);}`,
    transparent:true,vertexColors:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  scene.add(bgParticles);

  // ── CENTRAL WIREFRAME SPHERE ──
  const coreGeo=new THREE.IcosahedronGeometry(1.0,2);
  // Inner glow
  centralGlow=new THREE.Mesh(new THREE.SphereGeometry(0.9,32,32),
    new THREE.MeshBasicMaterial({color:0x00D9FF,transparent:true,opacity:0.10}));
  centralGlow.position.copy(CENTER); scene.add(centralGlow);
  // Wireframe
  centralWire=new THREE.LineSegments(new THREE.WireframeGeometry(coreGeo),
    new THREE.LineBasicMaterial({color:0x00D9FF,transparent:true,opacity:0.35}));
  centralWire.position.copy(CENTER); scene.add(centralWire);
  // Holographic shell
  const shellMat=new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`uniform float uTime;varying vec3 vN;void main(){float f=pow(1.0-abs(dot(vN,vec3(0,0,1))),3.0);float scan=step(0.98,sin(vN.y*40.0+uTime*2.0))*0.3;vec3 c=mix(vec3(0.0,0.85,1.0),vec3(0.74,0.0,1.0),vN.y*0.5+0.5);gl_FragColor=vec4(c,(f*0.2+scan)*0.8);}`,
    uniforms:{uTime:{value:0}},transparent:true,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
  centralSphere=new THREE.Mesh(coreGeo,shellMat);
  centralSphere.position.copy(CENTER); scene.add(centralSphere);

  // Möbius ring
  const mGeo=buildMobius(1.5,0.2,160,16);
  const mMat=new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vN;varying vec2 vUv;void main(){vUv=uv;vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`uniform float uTime;varying vec3 vN;varying vec2 vUv;void main(){vec3 cy=vec3(0.0,0.85,1.0);vec3 pu=vec3(0.74,0.0,1.0);float flow=sin(vUv.x*8.0-uTime*1.5)*0.5+0.5;vec3 c=mix(cy,pu,flow);float f=pow(1.0-abs(dot(vN,vec3(0,0,1))),2.5);float pulse=0.5+0.5*sin(uTime*0.5+vUv.x*4.0);gl_FragColor=vec4(c,f*0.25*pulse);}`,
    uniforms:{uTime:{value:0}},transparent:true,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
  mobiusMesh=new THREE.Mesh(mGeo,mMat);
  mobiusMesh.position.copy(CENTER); scene.add(mobiusMesh);

  // ── 5 STATION NODES ──
  const orbitR=2.8;
  SPACES.forEach((sp,i)=>{
    const angle=-Math.PI/2+(i/SPACES.length)*Math.PI*2;
    const x=CENTER.x+Math.cos(angle)*orbitR;
    const y=CENTER.y+Math.sin(angle)*orbitR*0.65;
    const z=Math.sin(angle*0.7)*1.2;
    const g=new THREE.Group(); g.position.set(x,y,z);

    // Wireframe icosahedron
    const oG=new THREE.IcosahedronGeometry(0.35,1);
    g.add(new THREE.LineSegments(new THREE.WireframeGeometry(oG),
      new THREE.LineBasicMaterial({color:sp.color,transparent:true,opacity:0.75})));
    // Inner glow
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16),
      new THREE.MeshBasicMaterial({color:sp.color,transparent:true,opacity:0.20})));
    // Orbital ring
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.45,0.55,32),
      new THREE.MeshBasicMaterial({color:sp.color,transparent:true,opacity:0.20,side:THREE.DoubleSide}));
    ring.rotation.x=Math.PI/2; g.add(ring);

    // Billboard glyph inside sphere
    const glyphSprite=new THREE.Sprite(new THREE.SpriteMaterial({
      map:makeGlyphTexture(sp.glyph,sp.color),transparent:true,opacity:0.85,
      depthWrite:false,blending:THREE.AdditiveBlending}));
    glyphSprite.scale.set(0.5,0.5,1);
    g.add(glyphSprite);

    g.userData={baseAngle:angle,orbitR,floatOff:i*1.3,rotSpd:0.008+i*0.002,label:sp.label,desc:sp.desc,glyph:sp.glyph,color:sp.color};
    scene.add(g); stationGroups.push(g);

    // Connection line
    const lG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,y,z),CENTER]);
    const line=new THREE.Line(lG,new THREE.LineBasicMaterial({color:sp.color,transparent:true,opacity:0.22}));
    scene.add(line); connectionLines.push({line,idx:i});

    // Data particles — bidirectional: 5 inbound (station→center), 5 outbound (center→station)
    for(let j=0;j<10;j++){
      const inbound=j<5;
      const dp=new THREE.Mesh(new THREE.SphereGeometry(inbound?0.025:0.02,6,6),
        new THREE.MeshBasicMaterial({color:inbound?sp.color:0x00D9FF,transparent:true,opacity:0.7}));
      dp.userData={idx:i,prog:j/(inbound?5:5),spd:0.002+Math.random()*0.003,inbound};
      scene.add(dp); dataParticles.push(dp);
    }
  });

  // Pre-create glyph packet textures for each station
  SPACES.forEach((sp,i)=>{
    const tex=makeGlyphTexture(sp.glyph,sp.color);
    stationGroups[i].userData.packetTex=tex;
    stationGroups[i].userData.lastPacket=Math.random()*3; // stagger initial spawn
  });

  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function buildMobius(R,w,sU,sV){
  const g=new THREE.BufferGeometry(),v=[],n=[],u=[],idx=[];
  for(let i=0;i<=sU;i++){const uu=(i/sU)*Math.PI*2;
    for(let j=0;j<=sV;j++){const vv=(j/sV-0.5)*w,h=uu/2;
      v.push((R+vv*Math.cos(h))*Math.cos(uu),(R+vv*Math.cos(h))*Math.sin(uu),vv*Math.sin(h));
      n.push(Math.cos(uu)*Math.sin(h),Math.sin(uu)*Math.sin(h),Math.cos(h));u.push(i/sU,j/sV)}}
  for(let i=0;i<sU;i++)for(let j=0;j<sV;j++){const a=i*(sV+1)+j,b=a+sV+1;idx.push(a,b,a+1,b,b+1,a+1)}
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(n,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(u,2));
  g.setIndex(idx);return g;
}


function animate(){
  requestAnimationFrame(animate);
  const t=clk.getElapsedTime();

  centralSphere.rotation.y=t*0.15;centralSphere.rotation.x=Math.sin(t*0.1)*0.1;
  centralSphere.material.uniforms.uTime.value=t;
  centralWire.rotation.y=t*0.12;centralWire.rotation.x=Math.sin(t*0.1)*0.1;
  centralGlow.scale.setScalar(1+Math.sin(t*0.8)*0.05);

  mobiusMesh.rotation.x=Math.sin(t*0.08)*0.2+0.4;mobiusMesh.rotation.z=t*0.03;
  mobiusMesh.material.uniforms.uTime.value=t;

  stationGroups.forEach((g,i)=>{
    const d=g.userData,a=d.baseAngle+orbitOffset,fy=Math.sin(t*0.5+d.floatOff)*0.12,fz=Math.cos(t*0.3+d.floatOff)*0.08;
    g.position.set(CENTER.x+Math.cos(a)*d.orbitR,CENTER.y+Math.sin(a)*d.orbitR*0.65+fy,Math.sin(a*0.7)*1.2+fz);
    g.children[0].rotation.y=t*d.rotSpd*10;g.children[0].rotation.x=t*d.rotSpd*7;
  });

  connectionLines.forEach(({line,idx})=>{
    const p=line.geometry.attributes.position.array,s=stationGroups[idx].position;
    p[0]=s.x;p[1]=s.y;p[2]=s.z;p[3]=CENTER.x;p[4]=CENTER.y;p[5]=CENTER.z;
    line.geometry.attributes.position.needsUpdate=true;
  });

  dataParticles.forEach(dp=>{
    const d=dp.userData;d.prog+=d.spd;if(d.prog>1)d.prog-=1;
    if(d.inbound){
      dp.position.lerpVectors(stationGroups[d.idx].position,CENTER,d.prog);
    }else{
      dp.position.lerpVectors(CENTER,stationGroups[d.idx].position,d.prog);
    }
    dp.material.opacity=Math.sin(d.prog*Math.PI)*0.7;
  });

  // ── GLYPH PACKETS — spawn every ~3s per station, fly along trace ──
  stationGroups.forEach((g,i)=>{
    const d=g.userData;
    if(t-d.lastPacket>2.5+Math.random()*1.5){
      d.lastPacket=t;
      const inbound=Math.random()>0.5;
      const pkt=new THREE.Sprite(new THREE.SpriteMaterial({
        map:d.packetTex,transparent:true,opacity:0.9,
        depthWrite:false,blending:THREE.AdditiveBlending}));
      pkt.scale.set(0.35,0.35,1);
      pkt.userData={idx:i,prog:0,spd:0.006+Math.random()*0.003,inbound,born:t};
      scene.add(pkt);glyphPackets.push(pkt);
    }
  });
  // Animate & cull packets
  for(let k=glyphPackets.length-1;k>=0;k--){
    const pkt=glyphPackets[k],pd=pkt.userData;
    pd.prog+=pd.spd;
    if(pd.inbound){
      pkt.position.lerpVectors(stationGroups[pd.idx].position,CENTER,pd.prog);
    }else{
      pkt.position.lerpVectors(CENTER,stationGroups[pd.idx].position,pd.prog);
    }
    const fade=Math.sin(pd.prog*Math.PI);
    pkt.material.opacity=fade*0.9;
    pkt.scale.setScalar(0.25+fade*0.15);
    if(pd.prog>=1){scene.remove(pkt);pkt.material.dispose();glyphPackets.splice(k,1)}
  }

  const bp=bgParticles.geometry.attributes.position.array;
  for(let i=0;i<bp.length;i+=3){bp[i]+=Math.sin(t*0.2+i)*0.0003;bp[i+1]+=Math.cos(t*0.15+i*0.5)*0.00025}
  bgParticles.geometry.attributes.position.needsUpdate=true;bgParticles.rotation.y=t*0.006;
  nebulaPlane.material.uniforms.uTime.value=t;

  renderer.render(scene,camera);
}

// ── DRAG/SWIPE CAROUSEL (adapted from repo's useSwipeCarousel) ──
let orbitOffset=0, orbitVelocity=0, isDragging=false, dragLastX=0, dragLastTime=0, momentumAF=0;
const DRAG_SENSITIVITY=0.004, MOMENTUM_DECAY=0.94;

function startDrag(clientX){
  if(clientX>window.innerWidth*0.7)return; // ignore right panel area
  cancelAnimationFrame(momentumAF);
  isDragging=true; dragLastX=clientX; orbitVelocity=0; dragLastTime=Date.now();
}
function moveDrag(clientX){
  if(!isDragging)return;
  const dx=clientX-dragLastX;
  orbitOffset+=dx*DRAG_SENSITIVITY;
  const now=Date.now(),dt=now-dragLastTime;
  if(dt>0)orbitVelocity=(dx*DRAG_SENSITIVITY)/dt*16;
  dragLastX=clientX; dragLastTime=now;
}
function endDrag(){
  if(!isDragging)return;
  isDragging=false;
  if(Math.abs(orbitVelocity)>0.001) momentumAF=requestAnimationFrame(momentumStep);
}
function momentumStep(){
  if(Math.abs(orbitVelocity)>0.0001){
    orbitOffset+=orbitVelocity;
    orbitVelocity*=MOMENTUM_DECAY;
    momentumAF=requestAnimationFrame(momentumStep);
  }
}
// Mouse
window.addEventListener('mousedown',e=>startDrag(e.clientX));
window.addEventListener('mousemove',e=>moveDrag(e.clientX));
window.addEventListener('mouseup',endDrag);
// Touch
window.addEventListener('touchstart',e=>startDrag(e.touches[0].clientX),{passive:true});
window.addEventListener('touchmove',e=>moveDrag(e.touches[0].clientX),{passive:true});
window.addEventListener('touchend',endDrag);

// ── Utils ──
const tip=document.getElementById('tip');
function showTip(e,t){tip.textContent=t;tip.style.opacity='1';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-6)+'px'}
function hideTip(){tip.style.opacity='0'}
document.addEventListener('mousemove',e=>{if(tip.style.opacity==='1'){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-6)+'px'}});
function clickFlash(type){const d=document.createElement('div');d.className='flash';
  d.style.background=`radial-gradient(circle at center,${type==='cyan'?'rgba(0,217,255,0.08)':'rgba(189,0,255,0.1)'},transparent 60%)`;
  document.body.appendChild(d);gsap.to(d,{opacity:0,duration:0.8,onComplete:()=>d.remove()})}
(function updateClock(){const n=new Date();document.getElementById('clock').textContent=
  [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');requestAnimationFrame(updateClock)})();

// ── RAYCASTER — click on station spheres to navigate ──
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2();
let hoveredStation=null;
const canvas3d=document.getElementById('three-canvas');

canvas3d.addEventListener('pointermove',e=>{
  pointer.x=(e.clientX/innerWidth)*2-1;
  pointer.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(pointer,camera);
  let found=null;
  for(let i=0;i<stationGroups.length;i++){
    const hits=raycaster.intersectObjects(stationGroups[i].children,true);
    if(hits.length>0){found=i;break}
  }
  if(found!==null){
    canvas3d.style.cursor='pointer';
    if(hoveredStation!==found){
      hoveredStation=found;
      showTip(e,SPACES[found].label+' — '+SPACES[found].desc);
    }
  } else {
    canvas3d.style.cursor='grab';
    if(hoveredStation!==null){hoveredStation=null;hideTip()}
  }
});

canvas3d.addEventListener('click',e=>{
  pointer.x=(e.clientX/innerWidth)*2-1;
  pointer.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(pointer,camera);
  for(let i=0;i<stationGroups.length;i++){
    const hits=raycaster.intersectObjects(stationGroups[i].children,true);
    if(hits.length>0){
      const sp=SPACES[i];
      clickFlash(sp.color===0x00D9FF?'cyan':'purple');
      // Brief flash animation then navigate
      gsap.to(stationGroups[i].scale,{x:1.3,y:1.3,z:1.3,duration:0.2,yoyo:true,repeat:1,
        onComplete:()=>{ window.location.href=sp.href; }
      });
      return;
    }
  }
});

buildArtCards();initThree();animate();
</script>
