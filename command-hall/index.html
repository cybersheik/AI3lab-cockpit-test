<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI³ Command Hall</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --cyan: #00E5FF; --purple: #7B2D8E; --orange: #FF6B2B;
    --dark: #0F1923; --surface: #162030; --surface-a: rgba(20,32,51,0.88);
    --text: #FFFFFF; --gray: #9aa3bf; --green: #4CAF50; --amber: #FF9800; --red: #F44336;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(165deg,#0F1923 0%,#142033 45%,#1A1528 100%);color:var(--text);overflow:hidden;-webkit-user-select:none;user-select:none}

/* ═══ FLOW CANVAS (background) ═══ */
#flow-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#flow-bg canvas{display:block;width:100%!important;height:100%!important}

/* ═══ OVERLAYS ═══ */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.65) 100%)}
.scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.15),transparent);animation:scan 5s linear infinite;pointer-events:none;z-index:60}
@keyframes scan{0%{transform:translateY(-2px);opacity:0}5%{opacity:1}95%{opacity:1}100%{transform:translateY(100vh);opacity:0}}

/* ═══ HUD HEADER ═══ */
.hud-header{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
.hud-header>*{pointer-events:auto}
.hud-left{display:flex;align-items:center;gap:10px}
.logo-badge{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;box-shadow:0 0 14px rgba(0,229,255,0.3);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(0,229,255,0.3)}50%{box-shadow:0 0 22px rgba(0,229,255,0.6),0 0 40px rgba(123,45,142,0.2)}}
.hud-title{font-size:16px;font-weight:800;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hud-right{display:flex;align-items:center;gap:14px}
.hud-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray)}
.hud-clock .v{color:var(--cyan)}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:5px;background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.12);font-size:9px;font-weight:600;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 5px var(--green)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.5}}

/* ═══ ROOM LABEL ═══ */
.room-label{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:20;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 6px rgba(0,229,255,0.3));transition:opacity 0.4s}

/* ═══ AVATAR CAROUSEL ═══ */
.carousel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;display:flex;align-items:center;gap:0;pointer-events:none;transition:opacity 0.4s}
.carousel.hidden{opacity:0;pointer-events:none}
.av{position:relative;display:flex;flex-direction:column;align-items:center;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);pointer-events:auto;cursor:pointer}
.av-orb{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);position:relative}
.av-orb::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid transparent;transition:all 0.3s}
.av.speaking .av-orb::after{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,0.3);animation:speakPulse 1.5s ease-in-out infinite}
@keyframes speakPulse{0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.3)}50%{box-shadow:0 0 35px rgba(0,229,255,0.6)}}
.av-label{margin-top:6px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.6;transition:opacity 0.3s}
.av.speaking .av-label{opacity:1;color:var(--cyan)}

/* AI avatars (center, large) */
.av.ai{margin:0 8px}
.av.ai .av-orb{width:60px;height:60px;font-size:14px;background:var(--surface);border:1.5px solid rgba(0,229,255,0.2)}
.av.ai.speaking .av-orb{width:76px;height:76px;font-size:16px;background:linear-gradient(135deg,rgba(0,229,255,0.12),rgba(123,45,142,0.12));border-color:var(--cyan)}

/* Human avatars (sides, small, muted) */
.av.human{margin:0 16px;opacity:0.35}
.av.human .av-orb{width:36px;height:36px;font-size:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
.av.human .av-label{font-size:8px}

/* ═══ NAVIGATION BAR (rooms) ═══ */
.nav-bar{position:fixed;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:4px;padding:4px;border-radius:12px;background:rgba(18,18,26,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.05);transition:bottom 0.4s}
.nav-bar.top-mode{top:80px;bottom:auto}
.nav-bar.bottom-mode{bottom:100px}
.nav-btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--gray);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.5px;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-btn.active{color:var(--cyan);background:rgba(0,229,255,0.08);box-shadow:0 0 12px rgba(0,229,255,0.08)}
.nav-btn .nav-dot{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:5px;vertical-align:middle}
.nav-btn.active .nav-dot{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}

/* ═══ MASTER PANEL WIDGET ═══ */
.panel-bar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;gap:2px;padding:6px 12px 10px;pointer-events:none}
.panel-tab{pointer-events:auto;padding:8px 16px;border-radius:8px 8px 0 0;border:none;background:rgba(18,18,26,0.65);backdrop-filter:blur(10px);color:var(--gray);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.5px;cursor:pointer;transition:all 0.25s;border-top:2px solid transparent}
.panel-tab:hover{color:var(--text);background:rgba(18,18,26,0.85)}
.panel-tab.active{color:var(--cyan);background:var(--surface-a);border-top-color:var(--cyan)}

.panel-drawer{position:fixed;bottom:0;left:0;right:0;z-index:25;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
.panel-drawer.open{transform:translateY(0);pointer-events:auto}
.panel-content{max-height:45vh;background:var(--surface-a);backdrop-filter:blur(20px);border-top:1px solid rgba(0,229,255,0.1);padding:20px 24px;overflow-y:auto}
.panel-content::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.4}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--cyan);margin-bottom:14px}
.panel-close{position:absolute;top:12px;right:20px;background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;z-index:5;pointer-events:auto}
.panel-close:hover{color:var(--cyan)}

/* Panel-specific */
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.a-card{padding:10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);transition:all 0.2s;cursor:pointer}
.a-card:hover{background:rgba(0,229,255,0.04);border-color:rgba(0,229,255,0.15)}
.a-card-id{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px}
.a-card-role{font-size:10px;color:var(--gray);margin-top:2px}
.a-card-st{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.st-on{color:var(--green)} .st-busy{color:var(--amber)} .st-off{color:var(--red);opacity:0.5}

.msg-list{display:flex;flex-direction:column;gap:5px}
.msg-row{display:flex;gap:10px;padding:7px 9px;border-radius:5px;background:rgba(255,255,255,0.015);font-size:11px}
.msg-route{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--cyan);min-width:60px}
.msg-txt{color:var(--gray);flex:1}
.msg-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--gray);opacity:0.4}

.code-block{background:rgba(0,0,0,0.3);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);line-height:1.6;max-height:30vh;overflow-y:auto}
.code-block .comment{color:var(--gray)}
.code-block .kw{color:var(--purple)}
.code-block .str{color:var(--orange)}

.input-area{display:flex;gap:8px;align-items:center}
.input-field{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.input-field:focus{border-color:rgba(0,229,255,0.3)}
.input-field::placeholder{color:var(--gray)}
.send-btn{width:40px;height:40px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--cyan),var(--purple));color:white;font-size:16px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(0,229,255,0.3)}

.notes-list{display:flex;flex-direction:column;gap:6px}
.note-item{padding:8px 10px;border-radius:6px;background:rgba(255,255,255,0.015);border-left:2px solid var(--purple)}
.note-title{font-size:12px;font-weight:600}
.note-meta{font-size:9px;color:var(--gray);margin-top:2px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
    .hud-title{font-size:13px}
    .av.ai .av-orb{width:48px;height:48px;font-size:12px}
    .av.ai.speaking .av-orb{width:60px;height:60px;font-size:14px}
    .av.human .av-orb{width:28px;height:28px;font-size:8px}
    .nav-btn{padding:5px 10px;font-size:9px}
    .panel-tab{padding:6px 10px;font-size:9px}
    .panel-content{padding:14px 16px}
}
@media(max-width:480px){
    .hud-right .status-pill{display:none}
    .nav-btn span{display:none}
    .av.human{display:none}
    .carousel{gap:0}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:2px}
/* Fullscreen button */
.fs-btn{position:fixed;bottom:20px;right:20px;z-index:99999;width:44px;height:44px;border-radius:50%;border:1px solid rgba(0,229,255,0.3);background:rgba(14,22,38,0.7);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;opacity:0.6}
.fs-btn:hover{opacity:1;border-color:rgba(0,229,255,0.7);box-shadow:0 0 15px rgba(0,229,255,0.3)}
.fs-btn svg{width:20px;height:20px;fill:none;stroke:#00E5FF;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<!-- FLOW BACKGROUND -->
<div id="flow-bg"></div>
<div class="vignette"></div>
<!-- scanline removed by LD -->

<!-- HUD HEADER -->
<div class="hud-header">
    <div class="hud-left">
        <div class="logo-badge">AI³</div>
        <div class="hud-title">Command Hall</div>
    </div>
    <div class="hud-right">
        <div class="hud-clock"><span class="v" id="clock">--:--</span></div>
        <div class="status-pill"><div class="s-dot"></div>AI/LAB</div>
    </div>
</div>

<!-- ROOM LABEL -->
<div class="room-label" id="room-label">Command Hall</div>

<!-- AVATAR CAROUSEL -->
<div class="carousel" id="carousel">
    <!-- Humans left -->
    <div class="av human"><div class="av-orb">A</div><div class="av-label">Aidar</div></div>
    <!-- AI agents center -->
    <div class="av ai speaking" data-id="0"><div class="av-orb" style="border-color:rgba(0,229,255,0.3)">LD</div><div class="av-label">Lord of Design</div></div>
    <div class="av ai" data-id="1"><div class="av-orb" style="border-color:rgba(33,150,243,0.2)">CX</div><div class="av-label">Codex</div></div>
    <div class="av ai" data-id="2"><div class="av-orb" style="border-color:rgba(76,175,80,0.2)">DW</div><div class="av-label">Cowork</div></div>
    <div class="av ai" data-id="3"><div class="av-orb" style="border-color:rgba(156,39,176,0.2)">DC</div><div class="av-label">Code</div></div>
    <!-- Humans right -->
    <div class="av human"><div class="av-orb">G</div><div class="av-label">Guest</div></div>
</div>

<!-- ROOM NAVIGATION -->
<div class="nav-bar bottom-mode" id="nav-bar">
    <button class="nav-btn active" onclick="switchRoom('cockpit')"><span class="nav-dot"></span>Plan</button>
    <button class="nav-btn" onclick="switchRoom('simulation')"><span class="nav-dot"></span>Simulation</button>
    <button class="nav-btn" onclick="switchRoom('comms')"><span class="nav-dot"></span>Comms</button>
    <button class="nav-btn" onclick="switchRoom('roundtable')"><span class="nav-dot"></span>Round Table</button>
</div>

<!-- MASTER PANEL TABS -->
<div class="panel-bar" id="panel-bar">
    <button class="panel-tab" onclick="togglePanel('avatars')">Avatars</button>
    <button class="panel-tab" onclick="togglePanel('comm')">Comm</button>
    <button class="panel-tab" onclick="togglePanel('code')">Code</button>
    <button class="panel-tab" onclick="togglePanel('input')">Input</button>
    <button class="panel-tab" onclick="togglePanel('notes')">Notes</button>
</div>

<!-- PANEL DRAWER -->
<div class="panel-drawer" id="panel-drawer">
    <div class="panel-content" id="panel-content">
        <button class="panel-close" onclick="closePanel()">&times;</button>
        <!-- Content injected by JS -->
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// INTELLIGENCE FLOW — p5.js background (instance mode)
// ═══════════════════════════════════════════════════════════════
const flowSketch = (p) => {
    let particles = [], attractors = [], palRGB = [], t = 0;
    const PAL = ['#00E5FF','#7B2D8E','#FF6B2B','#1A6EFF'];
    const PCOUNT = Math.min(3000, Math.round(window.innerWidth * 1.8));

    function hexRGB(h){let r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?[parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)]:[0,229,255]}

    p.setup = function() {
        let c = p.createCanvas(window.innerWidth, window.innerHeight);
        c.parent('flow-bg');
        p.blendMode(p.ADD);
        initFlow();
    };

    function initFlow() {
        p.randomSeed(42); p.noiseSeed(42);
        palRGB = PAL.map(hexRGB);
        attractors = [{x:p.width/2,y:p.height/2,strength:0.5,r:p.width*0.12,type:'mobius'}];
        let types=['spiral','pulse','orbit'];
        for(let i=0;i<3;i++){
            let ang=p.TWO_PI/3*i+p.random(-0.2,0.2);
            let dist=p.width*0.28;
            attractors.push({x:p.width/2+p.cos(ang)*dist,y:p.height/2+p.sin(ang)*dist,strength:0.15,r:p.width*0.06,type:types[i],phase:p.random(p.TWO_PI)});
        }
        particles=[];
        for(let i=0;i<PCOUNT;i++) particles.push(new Ag());
    }

    class Ag {
        constructor(){
            let roll=p.random();
            if(roll<0.5){let a=p.random(p.TWO_PI),r=p.random(20,p.width*0.2);this.x=p.width/2+p.cos(a)*r;this.y=p.height/2+p.sin(a)*r}
            else if(roll<0.8&&attractors.length>1){let at=attractors[p.floor(p.random(1,attractors.length))];let a=p.random(p.TWO_PI),r=p.random(10,at.r*3);this.x=at.x+p.cos(a)*r;this.y=at.y+p.sin(a)*r}
            else{this.x=p.random(p.width);this.y=p.random(p.height)}
            this.vx=0;this.vy=0;this.ms=p.random(1.5,4);this.ph=p.random(p.TWO_PI);this.age=0;this.ma=p.floor(p.random(120,400));this.sz=p.random(1.2,3)
        }
        run(){
            this.age++;if(this.age>this.ma){this.respawn();return}
            let life=1-this.age/this.ma;
            let fade=life<0.1?life/0.1:(life>0.8?(1-life)/0.2:1);
            let ns=0.003;
            let n1=p.noise(this.x*ns,this.y*ns,t*0.3);
            let n2=p.noise(this.x*ns*2.5+500,this.y*ns*2.5+500,t*0.4);
            let angle=(n1*0.7+n2*0.3)*p.TWO_PI*3;
            let ax=p.cos(angle)*0.5,ay=p.sin(angle)*0.5;
            for(let at of attractors){
                let dx=at.x-this.x,dy=at.y-this.y,d=p.sqrt(dx*dx+dy*dy);
                if(d<3)continue;let nx=dx/d,ny=dy/d;
                if(at.type==='mobius'){let z=at.r*4;if(d<z){let s=p.map(d,0,z,at.strength*2,0);let orb=p.map(d,0,z,2,0.3);let tw=p.sin(this.ph+t*4+d*0.03);let sg=tw>0?1:-1;ax+=(-ny*orb*sg+nx*s*0.25)*0.15;ay+=(nx*orb*sg+ny*s*0.25)*0.15}}
                else if(at.type==='spiral'){let z=at.r*5;if(d<z){let s=p.map(d,0,z,0.35,0);ax+=(-ny*0.5+nx*s)*s;ay+=(nx*0.5+ny*s)*s}}
                else if(at.type==='pulse'){let z=at.r*5;if(d<z){let pl=p.sin(t*6+at.phase);let s=p.map(d,0,z,0.35,0)*pl;ax+=nx*s;ay+=ny*s}}
                else if(at.type==='orbit'){let z=at.r*5;if(d<z){let s=p.map(d,0,z,0.4,0);ax+=-ny*s;ay+=nx*s}}
            }
            this.vx+=ax;this.vy+=ay;
            let spd=p.sqrt(this.vx*this.vx+this.vy*this.vy);
            if(spd>this.ms){this.vx*=this.ms/spd;this.vy*=this.ms/spd;spd=this.ms}
            this.vx*=0.96;this.vy*=0.96;
            this.x+=this.vx;this.y+=this.vy;
            if(this.x<-10)this.x=p.width+10;if(this.x>p.width+10)this.x=-10;
            if(this.y<-10)this.y=p.height+10;if(this.y>p.height+10)this.y=-10;
            let sn=p.constrain(spd/this.ms,0,1);
            let r,g,b;
            if(sn<0.4){let tt=sn/0.4;r=p.lerp(palRGB[1][0],palRGB[0][0],tt);g=p.lerp(palRGB[1][1],palRGB[0][1],tt);b=p.lerp(palRGB[1][2],palRGB[0][2],tt)}
            else if(sn<0.75){let tt=(sn-0.4)/0.35;r=p.lerp(palRGB[0][0],palRGB[3][0],tt);g=p.lerp(palRGB[0][1],palRGB[3][1],tt);b=p.lerp(palRGB[0][2],palRGB[3][2],tt)}
            else{let tt=(sn-0.75)/0.25;r=p.lerp(palRGB[3][0],palRGB[2][0],tt*0.35);g=p.lerp(palRGB[3][1],palRGB[2][1],tt*0.35);b=p.lerp(palRGB[3][2],palRGB[2][2],tt*0.35)}
            let minD=9999;for(let at of attractors){let dd=p.dist(this.x,this.y,at.x,at.y);if(dd<minD)minD=dd}
            let prox=p.constrain(p.map(minD,0,200,1.8,0.5),0.5,1.8);
            let alpha=0.55*fade*prox*(25+sn*35);
            let sz=this.sz*(0.6+sn*0.7)*prox*0.8;
            p.noStroke();p.fill(r,g,b,alpha);p.ellipse(this.x,this.y,sz,sz);
            if(sn>0.5&&minD<120){p.fill(r,g,b,alpha*0.25);p.ellipse(this.x,this.y,sz*3,sz*3)}
        }
        respawn(){
            let roll=p.random();
            if(roll<0.6){let at=attractors[p.floor(p.random(attractors.length))];let a=p.random(p.TWO_PI),rr=p.random(at.r*0.3,at.r*2.5);this.x=at.x+p.cos(a)*rr;this.y=at.y+p.sin(a)*rr}
            else{this.x=p.random(p.width);this.y=p.random(p.height)}
            this.vx=0;this.vy=0;this.age=0;this.ma=p.floor(p.random(120,400));this.ph=p.random(p.TWO_PI)
        }
    }

    p.draw = function(){
        p.blendMode(p.BLEND);p.fill(15,25,35,14);p.rect(0,0,p.width,p.height);p.blendMode(p.ADD);
        t+=0.008;
        // Core glow
        if(p.frameCount%3===0){let pl=p.sin(t*2)*0.3+0.7;let cx=p.width/2,cy=p.height/2;
        for(let r=100;r>0;r-=6){let a=p.map(r,0,100,1.2*pl,0);p.fill(palRGB[0][0],palRGB[0][1],palRGB[0][2],a);p.ellipse(cx,cy,r*2,r*2)}
        for(let r=30;r>0;r-=4){let a=p.map(r,0,30,0.8*pl,0);p.fill(palRGB[1][0],palRGB[1][1],palRGB[1][2],a);p.ellipse(cx,cy,r*2,r*2)}}
        // Satellite glows
        if(p.frameCount%5===0){for(let i=1;i<attractors.length;i++){let at=attractors[i];let pl=p.sin(t*3+at.phase)*0.2+0.4;
        for(let r=40;r>0;r-=5){let a=p.map(r,0,40,0.5*pl,0);let ci=at.type==='spiral'?palRGB[0]:at.type==='pulse'?palRGB[3]:palRGB[1];p.fill(ci[0],ci[1],ci[2],a);p.ellipse(at.x,at.y,r*2,r*2)}}}
        // Particles
        for(let pt of particles) pt.run();
    };

    p.windowResized = function(){p.resizeCanvas(window.innerWidth,window.innerHeight);initFlow()};
};
new p5(flowSketch);

                `<div class="note-item"><div class="note-title">${n.title}</div><div class="note-meta">${n.meta}</div></div>`
            ).join('')}

};

function togglePanel(name) {
    const drawer = document.getElementById('panel-drawer');
    const content = document.getElementById('panel-content');
    const tabs = document.querySelectorAll('.panel-tab');

    if (activePanel === name) { closePanel(); return; }

    activePanel = name;
    content.innerHTML = '<button class="panel-close" onclick="closePanel()">&times;</button>' + PANEL_CONTENT[name]();
    drawer.classList.add('open');

    tabs.forEach((tab, i) => {
        const names = ['avatars','comm','code','input','notes'];
        tab.classList.toggle('active', names[i] === name);
    });
}

function closePanel() {
    activePanel = null;
    document.getElementById('panel-drawer').classList.remove('open');
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
}

// ═══════════════════════════════════════════════════════════════
// ROOM NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentRoom = 'cockpit';

function switchRoom(room) {
    currentRoom = room;
    document.getElementById('room-label').textContent =
        room === 'cockpit' ? 'Plan' :
        room === 'simulation' ? 'Simulation Room' :
        room === 'comms' ? 'Communication Room' : 'Round Table';

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().toLowerCase().includes(room.substring(0,4)));
    });

    // Toggle carousel visibility based on room
    const carousel = document.getElementById('carousel');
    carousel.classList.toggle('hidden', room === 'simulation');
}

// ═══════════════════════════════════════════════════════════════
// AVATAR CAROUSEL — click to set speaker
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.av.ai').forEach(av => {
    av.addEventListener('click', () => {
        document.querySelectorAll('.av.ai').forEach(a => a.classList.remove('speaking'));
        av.classList.add('speaking');
    });
});

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    requestAnimationFrame(tick);
}
tick();

// ═══════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
    if (e.ctrlKey && e.key === '1') togglePanel('avatars');
    if (e.ctrlKey && e.key === '2') togglePanel('comm');
    if (e.ctrlKey && e.key === '3') togglePanel('code');
    if (e.ctrlKey && e.key === '4') togglePanel('input');
    if (e.ctrlKey && e.key === '5') togglePanel('notes');
});
