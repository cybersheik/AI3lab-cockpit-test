<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI³ Cockpit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00E5FF;
            --purple: #7B2D8E;
            --orange: #FF6B2B;
            --dark-bg: #0A0A0F;
            --dark-surface: #12121A;
            --dark-surface-alpha: rgba(18, 18, 26, 0.88);
            --light-text: #FFFFFF;
            --gray-text: #8B8B9A;
            --green: #4CAF50;
            --amber: #FF9800;
            --red: #F44336;
            --blue: #2196F3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--light-text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* ═══ LOADER ═══ */
        #loader {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--dark-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            transition: opacity 0.8s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .loader-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px; font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .loader-sub { font-size: 12px; color: var(--gray-text); letter-spacing: 3px; text-transform: uppercase; }
        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

        /* ═══ OVERLAYS ═══ */
        /* scanline removed — отвлекает */

        .vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 5;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
        }
        .crt-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: 4;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
            mix-blend-mode: screen;
        }

        /* ═══ TOPBAR ═══ */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .logo-badge {
            width: 36px; height: 36px; border-radius: 8px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px;
            box-shadow: 0 0 16px rgba(0,229,255,0.3);
            animation: badge-glow 3s ease-in-out infinite;
        }
        @keyframes badge-glow { 0%,100%{box-shadow:0 0 16px rgba(0,229,255,0.3)} 50%{box-shadow:0 0 24px rgba(0,229,255,0.6),0 0 48px rgba(123,45,142,0.2)} }
        .topbar-title {
            font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .mode-bar {
            display: flex; gap: 2px; padding: 3px;
            background: rgba(255,255,255,0.04); border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .mode-btn {
            padding: 5px 10px; border-radius: 6px; border: none;
            font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
            color: var(--gray-text); background: transparent; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.3px; white-space: nowrap;
        }
        .mode-btn.active { background: rgba(0,229,255,0.12); color: var(--cyan); }
        .mode-btn:hover:not(.active) { color: var(--light-text); }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px;
            background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.12);
            font-size: 10px; font-weight: 600; color: var(--cyan);
            letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
        }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }
        .hud-time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gray-text); }
        .hud-time .val { color: var(--cyan); }

        /* ═══ AVATAR CAROUSEL (как на сайте — 4 планеты сверху) ═══ */
        .avatar-strip {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; gap: 32px; align-items: flex-start;
            padding: 8px 20px;
        }
        .avatar-slot {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; transition: transform 0.3s;
            width: 64px; flex-shrink: 0;
        }
        .avatar-slot:hover { transform: translateY(-3px); }
        .avatar-slot.speaking { transform: translateY(-3px); }
        .avatar-orb {
            width: 52px; height: 52px; border-radius: 50%; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .avatar-orb::before {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            border: 1.5px solid transparent; transition: all 0.3s;
        }
        .avatar-slot.speaking .avatar-orb::before {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0,229,255,0.4);
            animation: pulse-ring 2s ease-in-out infinite;
        }
        @keyframes pulse-ring { 0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.4)} 50%{box-shadow:0 0 35px rgba(0,229,255,0.7)} }
        .avatar-orb-inner {
            width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* ═══ KIMI ORBITAL LOGO (compact) ═══ */
        .kimi-orbital {
            position: relative; width: 44px; height: 44px;
        }
        .kimi-orbital .k-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 14px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--ac), color-mix(in srgb, var(--ac) 60%, #000));
            box-shadow: 0 0 8px var(--ac), 0 0 16px color-mix(in srgb, var(--ac) 40%, transparent);
            z-index: 3;
            animation: kCorePulse 3s ease-in-out infinite;
        }
        @keyframes kCorePulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); box-shadow: 0 0 8px var(--ac), 0 0 16px color-mix(in srgb, var(--ac) 40%, transparent); }
            50% { transform: translate(-50%,-50%) scale(1.12); box-shadow: 0 0 12px var(--ac), 0 0 24px color-mix(in srgb, var(--ac) 60%, transparent); }
        }
        .kimi-orbital .k-orbit {
            position: absolute; top: 50%; left: 50%;
            border: 1px solid color-mix(in srgb, var(--ac) 35%, transparent);
            border-radius: 50%;
        }
        .kimi-orbital .k-o1 {
            width: 26px; height: 26px;
            animation: kOrbit1 6s linear infinite;
        }
        .kimi-orbital .k-o2 {
            width: 36px; height: 36px;
            border-color: color-mix(in srgb, var(--ac) 25%, transparent);
            animation: kOrbit2 9s linear infinite;
        }
        .kimi-orbital .k-o3 {
            width: 44px; height: 44px;
            animation: kOrbit3 13s linear infinite;
        }
        @keyframes kOrbit1 { from { transform: translate(-50%,-50%) rotateX(60deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(60deg) rotateZ(360deg); } }
        @keyframes kOrbit2 { from { transform: translate(-50%,-50%) rotateX(45deg) rotateY(30deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(45deg) rotateY(30deg) rotateZ(360deg); } }
        @keyframes kOrbit3 { from { transform: translate(-50%,-50%) rotateX(30deg) rotateY(-20deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(30deg) rotateY(-20deg) rotateZ(-360deg); } }
        .kimi-orbital .k-dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: var(--ac); box-shadow: 0 0 4px var(--ac);
        }
        .kimi-orbital .k-o1 .k-dot { top: 0; left: 50%; transform: translateX(-50%); }
        .kimi-orbital .k-o2 .k-dot { top: 50%; right: 0; transform: translateY(-50%); }
        .kimi-orbital .k-o3 .k-dot { bottom: 0; left: 50%; transform: translateX(-50%); }
        .kimi-orbital .k-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            border: 1px solid var(--ac); border-radius: 50%;
            opacity: 0; width: 14px; height: 14px;
        }
        .kimi-orbital .k-p1 { animation: kPulse 3s ease-out infinite; }
        .kimi-orbital .k-p2 { animation: kPulse 3s ease-out infinite 1s; }
        @keyframes kPulse {
            0% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
        }
        .avatar-name { font-size: 10px; font-weight: 600; color: var(--gray-text); letter-spacing: 0.3px; }
        .avatar-slot.speaking .avatar-name { color: var(--light-text); }
        .avatar-status-dot {
            position: absolute; bottom: 0; right: 0;
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid var(--dark-bg);
        }

        /* ═══ HUMAN PRESENCE POINTS ═══ */
        .human-presence {
            position: fixed; top: 50%; transform: translateY(-50%);
            z-index: 15; display: flex; flex-direction: column;
            align-items: center; gap: 6px; opacity: 0.5;
            transition: opacity 0.3s;
        }
        .human-presence:hover { opacity: 0.8; }
        .human-presence.left { left: 20px; }
        .human-presence.right { right: 20px; }
        .human-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .human-label {
            font-size: 9px; color: var(--gray-text);
            font-weight: 500; letter-spacing: 0.5px;
            writing-mode: vertical-rl; text-orientation: mixed;
        }

        /* ═══ BOTTOM DOCK (5 панелей) ═══ */
        .bottom-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 40; display: flex; justify-content: center;
            padding-bottom: 12px;
        }
        .dock-bar {
            display: flex; align-items: center; gap: 4px;
            padding: 8px 14px; border-radius: 20px;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 -8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .dock-btn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            padding: 8px 14px; border-radius: 14px;
            border: none; background: transparent;
            cursor: pointer; transition: all 0.25s; position: relative;
            font-family: 'Inter', sans-serif;
        }
        .dock-btn:hover { background: rgba(255,255,255,0.04); }
        .dock-btn.active { background: rgba(0,229,255,0.1); }
        .dock-icon {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            background: rgba(255,255,255,0.04);
            overflow: hidden;
        }
        .dock-btn.active .dock-icon {
            box-shadow: 0 0 16px var(--panel-color, rgba(0,229,255,0.4));
        }

        /* ═══ KIMI ORBITAL MICRO (dock buttons) ═══ */
        .kimi-micro {
            position: relative; width: 24px; height: 24px;
        }
        .kimi-micro .km-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--ac);
            box-shadow: 0 0 4px var(--ac);
            z-index: 3;
            animation: kmPulse 3s ease-in-out infinite;
        }
        @keyframes kmPulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50% { transform: translate(-50%,-50%) scale(1.2); box-shadow: 0 0 6px var(--ac); }
        }
        .kimi-micro .km-orbit {
            position: absolute; top: 50%; left: 50%;
            border: 0.8px solid color-mix(in srgb, var(--ac) 40%, transparent);
            border-radius: 50%;
        }
        .kimi-micro .km-o1 {
            width: 14px; height: 14px;
            animation: kOrbit1 6s linear infinite;
        }
        .kimi-micro .km-o2 {
            width: 20px; height: 20px;
            border-color: color-mix(in srgb, var(--ac) 30%, transparent);
            animation: kOrbit2 9s linear infinite;
        }
        .kimi-micro .km-dot {
            position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
            background: var(--ac); box-shadow: 0 0 3px var(--ac);
        }
        .kimi-micro .km-o1 .km-dot { top: 0; left: 50%; transform: translateX(-50%); }
        .kimi-micro .km-o2 .km-dot { top: 50%; right: 0; transform: translateY(-50%); }
        .dock-label { font-size: 9px; font-weight: 600; color: var(--gray-text); transition: color 0.2s; }
        .dock-btn.active .dock-label { color: var(--light-text); }
        .dock-notif {
            position: absolute; top: 4px; right: 10px;
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--red); border: 1.5px solid rgba(10,14,23,0.9);
            animation: pulse 1.5s infinite;
        }
        .dock-indicator {
            position: absolute; bottom: 2px;
            width: 16px; height: 2px; border-radius: 1px;
            transition: all 0.3s;
        }
        .dock-btn.active .dock-indicator { background: var(--panel-color, var(--cyan)); }

        /* ═══ SLIDE-UP PANEL ═══ */
        .panel-backdrop {
            position: fixed; inset: 0; z-index: 35;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .panel-backdrop.visible { opacity: 1; pointer-events: auto; }

        .slide-panel {
            position: fixed; bottom: 76px; left: 16px; right: 16px;
            z-index: 36; height: 380px;
            border-radius: 20px; overflow: hidden;
            background: linear-gradient(180deg, rgba(13,19,32,0.98), rgba(10,14,23,0.99));
            border: 1px solid rgba(0,229,255,0.15);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
            transform: translateY(110%); opacity: 0;
            transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
        }
        .slide-panel.visible {
            transform: translateY(0); opacity: 1;
        }
        .slide-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }

        .panel-content {
            height: 100%; padding: 20px 24px;
            display: flex; flex-direction: column;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .panel-title {
            font-size: 13px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .panel-close {
            width: 28px; height: 28px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--gray-text); font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .panel-close:hover { border-color: var(--cyan); color: var(--cyan); }
        .panel-body { flex: 1; overflow-y: auto; }

        /* ═══ PANEL: AVATARS ═══ */
        .avatars-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding-top: 12px; }
        .avatar-card {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 16px 20px; border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: all 0.2s; min-width: 100px;
        }
        .avatar-card:hover { background: rgba(0,229,255,0.04); border-color: rgba(0,229,255,0.15); transform: translateY(-2px); }
        .avatar-card-orb {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .avatar-card-orb svg {
            width: 26px; height: 26px;
        }
        .avatar-card-name { font-size: 12px; font-weight: 600; }
        .avatar-card-role { font-size: 10px; color: var(--gray-text); text-align: center; }
        .avatar-card-status {
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* ═══ PANEL: COMM ═══ */
        .comm-msg {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 12px; border-radius: 10px;
            background: rgba(255,255,255,0.02);
            border-left: 2px solid var(--cyan);
            margin-bottom: 8px; transition: background 0.2s;
        }
        .comm-msg:hover { background: rgba(0,229,255,0.03); }
        .comm-route {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: var(--cyan); white-space: nowrap; min-width: 90px;
        }
        .comm-route .arr { color: var(--gray-text); }
        .comm-body { flex: 1; min-width: 0; }
        .comm-topic { font-size: 12px; font-weight: 600; }
        .comm-text { font-size: 11px; color: var(--gray-text); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .comm-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gray-text); opacity: 0.5; white-space: nowrap; }
        .comm-input-row {
            display: flex; gap: 8px; margin-top: auto; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .comm-input {
            flex: 1; padding: 10px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            color: var(--light-text); font-family: 'Inter', sans-serif; font-size: 12px;
            outline: none; transition: border-color 0.2s;
        }
        .comm-input:focus { border-color: rgba(0,229,255,0.3); }
        .comm-input::placeholder { color: rgba(255,255,255,0.25); }
        .comm-send {
            padding: 10px 16px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: white; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: transform 0.15s; font-family: 'Inter', sans-serif;
        }
        .comm-send:hover { transform: scale(1.03); }
        .comm-send:active { transform: scale(0.97); }

        /* Routing buttons row */
        .routing-row {
            display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .route-chip {
            padding: 5px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 10px; font-weight: 600; color: var(--gray-text);
            cursor: pointer; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .route-chip:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.06); }
        .route-chip.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.1); }

        /* ═══ PANEL: CODE/TERMINAL ═══ */
        .terminal-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .terminal-tab {
            padding: 5px 12px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.04); color: var(--gray-text);
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .terminal-tab.active { background: rgba(76,175,80,0.15); color: var(--green); }
        .terminal-output {
            flex: 1; padding: 14px; border-radius: 10px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06);
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            line-height: 1.8; overflow-y: auto;
        }
        .term-green { color: #4CAF50; }
        .term-cyan { color: var(--cyan); }
        .term-blue { color: #42A5F5; }
        .term-yellow { color: #FFCA28; }
        .term-gray { color: rgba(255,255,255,0.5); }
        .term-cursor { display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

        /* ═══ PANEL: INPUT ═══ */
        .input-area {
            flex: 1; padding: 14px; border-radius: 12px;

let scene, camera, renderer, mobiusMesh, time = 0;

function initThree() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0A0A0F, 0.015);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 2, 12);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0x0A0A0F, 0.5));
    const l1 = new THREE.PointLight(0x00E5FF, 1.2, 50);
    l1.position.set(8, 10, 8);
    scene.add(l1);
    const l2 = new THREE.PointLight(0x7B2D8E, 0.8, 50);
    l2.position.set(-8, 5, -8);
    scene.add(l2);

    buildStarfield();
    buildMobius();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

function buildStarfield() {
    const count = 1200;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const cols = new Float32Array(count * 3);
    const palette = [new THREE.Color(0x00E5FF), new THREE.Color(0x7B2D8E), new THREE.Color(0xFFFFFF), new THREE.Color(0x8B8B9A)];
    for (let i = 0; i < count; i++) {
        const r = 30 + Math.random() * 80;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        const c = palette[Math.floor(Math.random() * palette.length)];
        cols[i*3] = c.r; cols[i*3+1] = c.g; cols[i*3+2] = c.b;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
    const stars = new THREE.Points(geo, mat);
    stars.userData.isStarfield = true;
    scene.add(stars);
}

function buildMobius() {
    const geo = new THREE.BufferGeometry();
    const verts = [], uvs = [], indices = [];
    const R = 2.5, tube = 0.5, us = 80, vs = 20;
    for (let i = 0; i <= us; i++) {
        const u = (i / us) * Math.PI * 2;
        for (let j = 0; j <= vs; j++) {
            const v = (j / vs) * 2 - 1;
            const x = (R + tube * v * Math.cos(u / 2)) * Math.cos(u);
            const y = (R + tube * v * Math.cos(u / 2)) * Math.sin(u);
            const z = tube * v * Math.sin(u / 2);
            verts.push(x, y, z);
            uvs.push(i / us, j / vs);
        }
    }
    for (let i = 0; i < us; i++) {
        for (let j = 0; j < vs; j++) {
            const a = i * (vs + 1) + j;
            const b = (i + 1) * (vs + 1) + j;
            const c = (i + 1) * (vs + 1) + (j + 1);
            const d = i * (vs + 1) + (j + 1);
            indices.push(a, b, d, b, c, d);
        }
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.ShaderMaterial({
        uniforms: { uTime: {value:0}, uColor1: {value: new THREE.Color(0x00E5FF)}, uColor2: {value: new THREE.Color(0x7B2D8E)} },
        vertexShader: `varying vec2 vUv; varying vec3 vNormal; void main(){ vUv=uv; vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `
            uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2;
            varying vec2 vUv; varying vec3 vNormal;
            void main(){
                float flow=sin(vUv.x*6.28318+uTime*0.5)*0.5+0.5;
                vec3 color=mix(uColor1,uColor2,flow);
                vec3 viewDir=normalize(cameraPosition-vNormal);
                float fresnel=pow(1.0-abs(dot(viewDir,vNormal)),2.0);
                float alpha=0.6+fresnel*0.4;
                gl_FragColor=vec4(color+fresnel*0.3,alpha);
            }`,
        transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
    });
    mobiusMesh = new THREE.Mesh(geo, mat);
    mobiusMesh.rotation.x = Math.PI / 2;
    scene.add(mobiusMesh);

    // Core glow sphere
    const coreGeo = new THREE.SphereGeometry(0.8, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x00E5FF, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending });
    scene.add(new THREE.Mesh(coreGeo, coreMat));
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    if (mobiusMesh) {
        mobiusMesh.rotation.z = time * 0.08;
        mobiusMesh.material.uniforms.uTime.value = time * 100;
    }
    scene.children.forEach(c => { if (c.userData.isStarfield) c.rotation.y = time * 0.015; });
    renderer.render(scene, camera);
}

    const body = document.getElementById('notes-body');
    if (view === 'journal') {
        body.innerHTML = NOTES.map(n => `<div class="note-entry"><div class="note-time">${n.time}</div><div class="note-text">${n.text}</div></div>`).join('');
    } else if (view === 'docs') {
        body.innerHTML = `<div class="doc-grid">${['Business Model Canvas','Hypothesis Log','Run Config','Debrief Notes'].map(d => `<div class="doc-card"><div class="doc-card-icon">📄</div><div class="doc-card-name">${d}</div></div>`).join('')}</div>`;
    } else {
        body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--gray-text);font-size:13px;">📷 Camera feed — visual context for AI agents</div>';
    }
}

// ═══════════════════════════════════════════════
// PANEL LOGIC
// ═══════════════════════════════════════════════

function togglePanel(id) {
    if (currentPanel === id) {
        closePanel();
    } else {
        openPanel(id);
    }
}

function openPanel(id) {
    currentPanel = id;
    const panel = document.getElementById('slide-panel');
    const backdrop = document.getElementById('panel-backdrop');
    const cfg = PANELS_CFG.find(p => p.id === id);

    renderPanelContent(id);
    renderDock();

    // Update panel border color
    panel.style.borderColor = cfg.color + '30';

    backdrop.classList.add('visible');
    requestAnimationFrame(() => panel.classList.add('visible'));
}

function closePanel() {
    const panel = document.getElementById('slide-panel');
    const backdrop = document.getElementById('panel-backdrop');
    panel.classList.remove('visible');
    backdrop.classList.remove('visible');
    setTimeout(() => {
        currentPanel = null;
        renderDock();
    }, 350);
}

function focusAvatar(id) {
    speakingAvatar = id;
    renderAvatars();
    if (currentPanel !== 'avatars') openPanel('avatars');
}

// setVariant removed — анимация всегда slide

// ═══════════════════════════════════════════════
// CLOCK & INIT
// ═══════════════════════════════════════════════

function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape' && currentPanel) closePanel(); });

// Loader
let progress = 0;
const loadInterval = setInterval(() => {
    progress += Math.random() * 25 + 10;
    if (progress > 100) progress = 100;
    document.getElementById('loader-fill').style.width = progress + '%';
    if (progress >= 100) {
        clearInterval(loadInterval);
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
    }
}, 180);

// Init
renderAvatars();
renderDock();
updateClock();
setInterval(updateClock, 1000);
initThree();
</script>
